<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SPORTVISE — Connexion</title>
  <script>
  // CACHE CLEANER v21 — async, exposes window._cacheCleanDone promise
  // ALL redirects must await this before navigating to dashboard
  window._cacheCleanDone = (async function(){
    try {
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(function(r) { return r.unregister(); }));
      }
      if ('caches' in window) {
        var keys = await caches.keys();
        await Promise.all(keys.map(function(k) { return caches.delete(k); }));
      }
    } catch(e) { console.warn('Cache clean error:', e); }
  })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07091a; --bg2: #0d1127; --bg3: #111827;
      --border: #1e2d47; --gold: #f59e0b; --green: #10b981;
      --red: #ef4444; --text: #f1f5f9; --muted: #64748b;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    body::before {
      content: ''; position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 600px; height: 500px;
      background: radial-gradient(ellipse, #f59e0b0a 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .logo {
      font-size: 26px; font-weight: 900; letter-spacing: 3px;
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px; text-align: center;
    }
    .tagline { font-size: 13px; color: var(--muted); margin-bottom: 40px; text-align: center; }
    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 36px; width: 100%; max-width: 400px;
      position: relative; z-index: 1;
    }
    .card h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .card p { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
    .tabs {
      display: flex; gap: 0; margin-bottom: 28px;
      background: var(--bg); border-radius: 8px; padding: 4px;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 9px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: transparent; color: var(--muted); transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .tab.active { background: var(--bg2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input {
      width: 100%; padding: 12px 16px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--gold); }
    .field input::placeholder { color: var(--muted); }
    .btn-main {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #07091a; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
      margin-top: 8px;
    }
    .btn-main:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-main:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 12px; color: var(--muted); }
    .alert {
      padding: 12px 16px; border-radius: 8px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .alert.error { background: #ef444415; border: 1px solid #ef444430; color: #fca5a5; display: block; }
    .alert.success { background: #10b98115; border: 1px solid #10b98130; color: #6ee7b7; display: block; }
    .back-link {
      text-align: center; margin-top: 24px;
      font-size: 13px; color: var(--muted);
    }
    .back-link a { color: var(--gold); text-decoration: none; font-weight: 600; }
    .sports-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px;
    }
    .sport-btn {
      padding: 8px 4px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--muted); font-size: 12px; font-weight: 500;
      cursor: pointer; text-align: center; transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .sport-btn:hover { border-color: var(--gold); color: var(--text); }
    .sport-btn.selected { border-color: var(--gold); background: #f59e0b15; color: var(--gold); font-weight: 700; }
    .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #07091a; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SPORTVISE" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <!-- SW removed v21 -->
</head>
<body>

<div class="logo">SPORTVISE</div>
<div class="tagline">🇨🇭 Management Sportif IA · Suisse</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Se connecter</button>
    <button class="tab" onclick="showTab('signup')">Créer un compte</button>
  </div>

  <!-- ALERT -->
  <div class="alert" id="alert"></div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="Ex: votre@email.ch" />
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="loginPassword" placeholder="••••••••" />
    </div>
    <button class="btn-main" id="loginBtn" onclick="login()">Se connecter →</button>
    <div style="text-align:center;margin-top:14px">
      <a href="#" onclick="showTab('reset');return false" style="font-size:12px;color:var(--muted);text-decoration:none;transition:color 0.2s" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--muted)'">Mot de passe oublié ?</a>
    </div>
  </div>

  <!-- RESET PASSWORD FORM -->
  <div id="resetForm" style="display:none">
    <p style="font-size:14px;color:var(--muted);margin-bottom:20px">Entrez votre email et nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="resetEmail" placeholder="votre@email.ch" />
    </div>
    <button class="btn-main" id="resetBtn" onclick="resetPassword()">Envoyer le lien →</button>
    <div style="text-align:center;margin-top:14px">
      <a href="#" onclick="showTab('login');return false" style="font-size:12px;color:var(--muted);text-decoration:none;transition:color 0.2s" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--muted)'">← Retour à la connexion</a>
    </div>
  </div>

  <!-- NEW PASSWORD FORM (after clicking recovery link) -->
  <div id="newPasswordForm" style="display:none">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:6px">🔐 Nouveau mot de passe</h2>
    <p style="font-size:14px;color:var(--muted);margin-bottom:20px">Choisissez votre nouveau mot de passe.</p>
    <div class="field">
      <label>Nouveau mot de passe</label>
      <input type="password" id="newPassword" placeholder="Minimum 8 caractères" />
    </div>
    <div class="field">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe" />
    </div>
    <button class="btn-main" id="newPassBtn" onclick="updatePassword()">Confirmer le nouveau mot de passe →</button>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signupForm" style="display:none">
    <div class="field">
      <label>Prénom & Nom</label>
      <input type="text" id="signupName" placeholder="Ex: Lara Müller" />
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="Ex: lara@email.ch" />
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="signupPassword" placeholder="Minimum 8 caractères" />
    </div>
    <div class="field">
      <label>Votre sport</label>
      <div class="sports-grid">
        <button class="sport-btn selected" onclick="selectSport(this,'Football')">⚽ Football</button>
        <button class="sport-btn" onclick="selectSport(this,'Hockey')">🏒 Hockey</button>
        <button class="sport-btn" onclick="selectSport(this,'Tennis')">🎾 Tennis</button>
        <button class="sport-btn" onclick="selectSport(this,'Ski')">⛷️ Ski</button>
        <button class="sport-btn" onclick="selectSport(this,'Natation')">🏊 Natation</button>
        <button class="sport-btn" onclick="selectSport(this,'Autre')">🏅 Autre</button>
      </div>
    </div>
    <button class="btn-main" id="signupBtn" onclick="signup()">Créer mon compte →</button>
  </div>

</div>

<div class="back-link">
  <a href="/index.html">← Retour à sportvise.ch</a>
</div>

<script>
  // ── SUPABASE CONFIG ──────────────────────────────
  const SUPABASE_URL = 'https://ckikyvokurpehavjlkbc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNraWt5dm9rdXJwZWhhdmpsa2JjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjE2MzgsImV4cCI6MjA5MTY5NzYzOH0.nbvRqNly8KnqlaInY62C9YOA5-32YxrFSavXyreCOYY';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── STATE ─────────────────────────────────────────
  let selectedSport = 'Football';

  // ── REFERRAL CODE ─────────────────────────────────
  const urlParams = new URLSearchParams(window.location.search);
  const refCode = urlParams.get('ref');
  // Validate referral code is a valid UUID format before storing
  const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
  if (refCode && uuidRegex.test(refCode)) {
    setTimeout(() => showTab('signup'), 100);
    localStorage.setItem('sv_ref', refCode);
  }

  // ── CHECK AUTH & RECOVERY ──────────────────────────
  let isRecoveryMode = false;

  async function checkAuth() {
    // Detect recovery token in URL hash (Supabase redirects with #access_token=...&type=recovery)
    const hash = window.location.hash;
    if (hash && hash.includes('type=recovery')) {
      isRecoveryMode = true;
      // Let Supabase process the token
      const { data, error } = await sb.auth.getSession();
      if (data?.session) {
        // Show new password form
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('signupForm').style.display = 'none';
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('newPasswordForm').style.display = 'block';
        document.querySelector('.tabs').style.display = 'none';
        return; // Don't redirect to dashboard
      }
    }

    const { data: { session } } = await sb.auth.getSession();
    if (session && !isRecoveryMode) {
      // CRITICAL: wait for SW cleanup before redirecting to dashboard
      await window._cacheCleanDone;
      window.location.href = 'dashboard.html?v=26&t=' + Date.now();
    }
  }

  // Listen for Supabase auth events (PASSWORD_RECOVERY)
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      isRecoveryMode = true;
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('signupForm').style.display = 'none';
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('newPasswordForm').style.display = 'block';
      document.querySelector('.tabs').style.display = 'none';
    }
  });

  checkAuth();

  // ── TAB SWITCH ────────────────────────────────────
  function showTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === (tab==='login' || tab==='reset' ? 0 : 1)));
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('resetForm').style.display = tab === 'reset' ? 'block' : 'none';
    hideAlert();
  }

  function selectSport(btn, sport) {
    document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedSport = sport;
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg; el.className = 'alert ' + type;
  }
  function hideAlert() {
    document.getElementById('alert').className = 'alert';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="loading"></span>Chargement...' : (btnId === 'loginBtn' ? 'Se connecter →' : 'Créer mon compte →');
  }

  // ── UPDATE PASSWORD (after recovery link) ─────────
  async function updatePassword() {
    const pw = document.getElementById('newPassword').value;
    const pw2 = document.getElementById('confirmPassword').value;
    if (!pw || !pw2) return showAlert('Veuillez remplir les deux champs.', 'error');
    if (pw.length < 8) return showAlert('Le mot de passe doit contenir au moins 8 caractères.', 'error');
    if (pw !== pw2) return showAlert('Les mots de passe ne correspondent pas.', 'error');
    const btn = document.getElementById('newPassBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>Mise à jour...';
    const { error } = await sb.auth.updateUser({ password: pw });
    btn.disabled = false;
    btn.innerHTML = 'Confirmer le nouveau mot de passe →';
    if (error) return showAlert(error.message, 'error');
    showAlert('✅ Mot de passe mis à jour avec succès ! Redirection...', 'success');
    setTimeout(async () => { await window._cacheCleanDone; window.location.href = 'dashboard.html?v=26&t=' + Date.now(); }, 1500);
  }

  // ── RESET PASSWORD ────────────────────────────────
  async function resetPassword() {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) return showAlert('Veuillez entrer votre email.', 'error');
    const btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>Envoi en cours...';
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    });
    btn.disabled = false;
    btn.innerHTML = 'Envoyer le lien →';
    if (error) return showAlert(error.message, 'error');
    showAlert('✅ Un email de réinitialisation a été envoyé ! Vérifiez votre boîte de réception.', 'success');
  }

  // ── LOGIN ─────────────────────────────────────────
  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showAlert('Veuillez remplir tous les champs.', 'error');
    setLoading('loginBtn', true);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading('loginBtn', false);
    if (error) return showAlert('Email ou mot de passe incorrect.', 'error');
    await window._cacheCleanDone;
    window.location.href = 'dashboard.html?v=26&t=' + Date.now();
  }

  // ── SIGNUP ────────────────────────────────────────
  async function signup() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    if (!name || !email || !password) return showAlert('Veuillez remplir tous les champs.', 'error');
    if (password.length < 8) return showAlert('Le mot de passe doit contenir au moins 8 caractères.', 'error');
    setLoading('signupBtn', true);
    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { full_name: name, sport: selectedSport } }
    });
    setLoading('signupBtn', false);
    if (error) return showAlert(error.message, 'error');

    // Envoyer l'email de bienvenue
    try {
      await fetch('/.netlify/functions/send-welcome', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, sport: selectedSport })
      });
    } catch(e) { console.log('Welcome email skipped:', e); }

    // Enregistrer le parrainage si lien de referral
    const savedRef = localStorage.getItem('sv_ref');
    if (savedRef && data?.user?.id && savedRef !== data.user.id) {
      try {
        await sb.from('referrals').insert({
          referrer_id: savedRef,
          referred_email: email,
          referred_id: data.user.id,
          status: 'pending'
        });
        localStorage.removeItem('sv_ref');
      } catch(e) { console.log('Referral save skipped:', e); }
    }

    // Vérifier si la confirmation email est requise
    if (data?.user?.identities?.length === 0) {
      // Email déjà utilisé (Supabase ne le dit pas directement pour la sécurité)
      return showAlert('Un compte avec cet email existe peut-être déjà. Essayez de vous connecter.', 'error');
    }

    if (data?.user && !data?.session) {
      // Confirmation email requise — pas de session active
      showAlert('✅ Compte créé ! Vérifiez votre boîte email pour confirmer votre inscription avant de vous connecter.', 'success');
      document.getElementById('signupBtn').style.display = 'none';
      // Afficher un bouton pour revenir à la connexion
      const backBtn = document.createElement('button');
      backBtn.className = 'btn-main';
      backBtn.style.marginTop = '12px';
      backBtn.style.background = 'transparent';
      backBtn.style.border = '1px solid var(--gold)';
      backBtn.style.color = 'var(--gold)';
      backBtn.textContent = 'Retour à la connexion →';
      backBtn.onclick = () => showTab('login');
      document.getElementById('signupForm').appendChild(backBtn);
    } else if (data?.session) {
      // Si Supabase a directement créé une session (confirmation désactivée)
      await window._cacheCleanDone;
      window.location.href = 'dashboard.html?v=26&t=' + Date.now();
    }
  }

  // ── ENTER KEY ─────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const loginVisible = document.getElementById('loginForm').style.display !== 'none';
      loginVisible ? login() : signup();
    }
  });
</script>
</body>
</html>
