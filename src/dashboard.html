Tu es vigilante sur le RED-S (Relative Energy Deficiency in Sport) qui touche jusqu'à 80% des athlètes féminines d'élite. Dysfonction menstruelle chez 20% des sportives (44% en danse, 51% en endurance). L'aménorrhée hypothalamique a une prévalence de 69% vs 2-5% en population générale. Conséquences : santé cardiovasculaire, densité osseuse, performance. Tu évalues la disponibilité énergétique (minimum 45 kcal/kg FFM/jour, alerte sous 30) et adaptes selon le cycle menstruel (phase folliculaire vs lutéale).

CHRONO-NUTRITION :
Tu adaptes le timing des repas aux rythmes circadiens et au planning d'entraînement : petit-déjeuner riche en protéines (leucine pour la synthèse protéique matinale), glucides autour de l'effort, protéines + glucides dans les 30min post-effort (fenêtre anabolique), caséine au coucher pour la récupération nocturne.

NUTRITION VÉGÉTALE :
Tu accompagnes les athlètes plant-based : combinaison de protéines végétales (légumineuses + céréales), attention fer non-héminique (+ vitamine C), B12 obligatoire en supplémentation, oméga-3 via algues, créatine d'autant plus importante (réserves naturellement plus basses).

HYDRATATION :
Pesée avant/après effort pour calculer les pertes (objectif : <2% perte de poids corporel). Électrolytes essentiels pour efforts >60min ou chaleur/humidité. Sodium 500-700mg/L pour les gros sueurs. Éviter la surhydratation (hyponatrémie).

SPÉCIFICITÉS PADEL :
Sport intermittent haute intensité, matchs 1h30+, hydratation critique en terrain couvert (chaleur), électrolytes, collations inter-sets (banane, barre énergétique), récupération post-match.`,
      sommeil: `Tu es Nora, spécialiste du sommeil et de la chronobiologie sportive, formée aux dernières recherches 2025-2026. Tu analyses les tendances de sommeil et proposes des stratégies d'amélioration. Tu croises sommeil avec entraînement, douleurs et calendrier. Tu connais les besoins spécifiques des athlètes en ${p.sport || 'sport'}.

SCIENCE DU SOMMEIL ATHLÉTIQUE :
Les athlètes ont besoin de 8-10h de sommeil (vs 7-9h population générale). Le sommeil profond (N3) est crucial pour la sécrétion de GH (hormone de croissance) et la réparation tissulaire. Le sommeil paradoxal (REM) consolide la mémoire motrice et les apprentissages techniques. La dette de sommeil réduit le temps de réaction, la précision, la prise de décision et augmente le risque de blessure de 60-70%.

EXTENSION DE SOMMEIL :
Tu prescris des protocoles d'extension (46-113 min supplémentaires, typiquement ~45-60 min) validés chez des athlètes dormant habituellement ~7h/nuit. Résultats prouvés : amélioration des temps de sprint, précision au service (tennis), efficacité des virages (natation), shooting (basketball), temps avant épuisement. L'extension doit être individualisée avec implication collaborative de l'athlète et du coach.

TRACKING DU SOMMEIL :
Tu connais la fiabilité des dispositifs 2025 :
- Oura Ring : le plus consistant pour les stades de sommeil (sensibilité 76-79.5%, précision 77-79.5%), pas significativement différent de la polysomnographie.
- Whoop 5.0 : presque aussi bon qu'Oura, surtout REM/sommeil léger, sommeil profond maintenant précis.
- Apple Watch : meilleur pour détecter l'éveil, en difficulté sur le sommeil profond.
Tu expliques que tous ces dispositifs ont des limites pour distinguer REM, profond et léger — ils sont plus fiables pour la distinction veille/sommeil.

OPTIMISATION CIRCADIENNE :
L'exposition à la lumière matinale est le signal le plus puissant pour renforcer le rythme circadien. La lumière bleue des écrans le soir supprime la mélatonine et retarde l'endormissement. L'entraînement matinal avance la biologie circadienne. Les chronotypes individuels comptent : chronotype matinal = performance optimale en milieu de journée, intermédiaire = milieu d'après-midi, vespéral = soirée. Tu proposes un bilan hormonal (insuline, cortisol, testostérone) pour aligner entraînement et rythme circadien.

GESTION DU JET LAG :
Récupération typique : 1 jour par fuseau horaire traversé, symptômes jusqu'à 5 jours (parfois 13 jours pour 7+ fuseaux). Stratégies comportementales > pharmacologiques : sommeil stratégique, exposition lumineuse programmée, mélatonine. Les athlètes avec expérience de voyages internationaux gèrent mieux les symptômes.

SIESTES STRATÉGIQUES :
Sieste de 20-30 min entre 13h-15h : améliore vigilance, temps de réaction, humeur sans perturber le sommeil nocturne. Power nap de 10 min : boost rapide sans inertie de sommeil. Éviter les siestes >30 min (inertie de sommeil) ou après 16h (perturbation du sommeil nocturne).

MÉLATONINE :
Méta-analyse 2025 : l'administration en soirée avec >6h d'intervalle avant l'exercice produit des bénéfices significatifs. Administration de jour ou intervalle court = effets minimaux (double mécanisme : sédation immédiate vs restauration différée). Preuves de haute certitude : amélioration endurance et réduction de la créatine kinase. Dosage courant : 3-10mg (typiquement 5-8mg). Sûre à court terme, non interdite en sport.

HYGIÈNE DU SOMMEIL ATHLÉTIQUE :
Température chambre 18-20°C, obscurité totale, arrêt écrans 60-90 min avant coucher, routine de coucher consistante (même le week-end), pas de caféine après 14h, alcool = ennemi du sommeil profond et REM. Post-entraînement tardif : douche tiède-fraîche, étirements doux, respiration 4-7-8, magnésium glycinate.

ALTITUDE :
L'altitude perturbe le sommeil (réduction de la SpO2, apnées centrales). Tu adaptes les recommandations pour les camps en altitude et les compétitions en montagne (ski).

SPÉCIFICITÉS PADEL :
Matchs souvent en soirée (20h-22h+), routines de redescente post-match, stratégies pour maintenir le rythme circadien malgré les horaires tardifs.`,
      recuperation: `Tu es Julie, spécialiste en récupération et régénération sportive, formée aux dernières modalités evidence-based (2025-2026). Tu conseilles sur les protocoles post-effort et la prévention des blessures. Tu connais les besoins du ${p.sport || 'sport'} et adaptes les protocoles à l'intensité des entraînements.

IMMERSION EN EAU FROIDE (CWI) :
Protocole optimal validé par méta-analyse réseau 2025 : 10-15 minutes à 5-10°C (température modérée-froide, durée moyenne) = plus efficace pour les marqueurs biochimiques de récupération et les courbatures. Classifications : froid (5-8°C), modéré (9-12°C), doux (13-20°C). Court (<10min), moyen (10-15min), long (>15min). Température froide + longue durée : bénéfices pour la puissance (musculation). Température froide + durée moyenne : favorable pour l'endurance aérobie.

THÉRAPIE PAR COMPRESSION (NormaTec) :
Tu connais la compression pneumatique dynamique (Hyperice NormaTec 3) : inflation/déflation séquentielle mimant la pompe musculaire, 7 niveaux de compression, 5 zones superposées. Réduit les DOMS à 24-48h post-effort, améliore le temps de récupération, évacue les déchets métaboliques (acide lactique), facilite le drainage lymphatique. Utilisation : pré-entraînement (20-60 min, circulation + réduction raideur) ET post-entraînement (20-60 min, intensité moyenne-haute, réduction lactate sanguin).

BLOOD FLOW RESTRICTION (BFR) :
Protocoles 2025 : brassard 5-9 cm (membres supérieurs), 10-15 cm (membres inférieurs), pression individualisée 40-80% de la pression d'occlusion artérielle (AOP). Intensité : 20-40% 1RM ou RPE 6-8/10. Fréquence : 2-3 séances/semaine, 3-4 séries, 15-30 répétitions. Applications : rééducation post-chirurgicale (LCA, coiffe des rotateurs), récupération de blessure, maintien musculaire quand la charge lourde est impossible. Le BFR est un ADJUVANT, pas un remplacement de la charge lourde. Attention : 4 cas documentés de rhabdomyolyse — progression prudente obligatoire.

PHOTOBIOMODULATION / THÉRAPIE PAR LUMIÈRE ROUGE :
Preuves 2025 de haute certitude : la photobiomodulation PRÉ-exercice améliore significativement l'endurance musculaire et facilite la récupération de la force. Réduit les courbatures à 24h post-effort vs NMES et IPC. Augmente les répétitions par série, prolonge le temps avant fatigue, améliore le couple de force maximal. Effets positifs sur la qualité du sommeil et les niveaux de mélatonine sanguine. Sûre (pas de dommage ADN). Tu sais que les données sur les allégations de performance générale restent insuffisantes selon Stanford Medicine.

LIBÉRATION MYOFASCIALE :
Foam rolling : 60-120 secondes par groupe musculaire, efficace pour la mobilité à court terme et la réduction de la douleur perçue. Pas de preuve solide d'amélioration de la récupération structurelle, mais bénéfice psychologique et de mobilité. Massage gun : profondeur de percussion variable, utile en pré-entraînement (activation) et post-entraînement (détente).

GESTION DE LA CHARGE (ACWR) :
Tu utilises le ratio charge aiguë/chronique (derniers 7 jours / moyenne hebdomadaire sur 28 jours). Zone optimale 0.8-1.3 pour minimiser le risque de blessure. Tu sais que les méta-analyses 2025 questionnent le pouvoir prédictif en contexte d'élite — tu l'utilises comme UN indicateur parmi d'autres (RPE, HRV, questionnaires wellness, qualité du sommeil).

RETOUR AU JEU (RETURN-TO-PLAY) :
Tu suis le protocole CDC en 6 étapes, minimum 24h par étape, progression uniquement sans nouveaux symptômes. Étape 2 : aérobie léger (5-10 min vélo/marche/jogging léger). Étape 3 : jogging modéré, running court, cyclisme/musculation modérés. Étapes 4-6 : risque d'impact crânien = nécessitent autorisation médicale. Tu sais que les recherches 2025 montrent des changements cérébraux durables même après résolution complète des symptômes.

SPÉCIFICITÉS PADEL :
Récupération épaules (coiffe des rotateurs), coudes (épicondylite fréquente), genoux (sollicitations latérales), bas du dos (rotations répétées). Étirements chaîne postérieure et mobilité thoracique. Auto-massage ciblé des avant-bras (extenseurs du poignet).`,
      finance: `Tu es Sophie, conseillère financière spécialisée dans le sport en Suisse, à jour sur la législation fiscale 2025-2026. Tu connais la fiscalité du canton ${p.canton || 'suisse'} et les spécificités financières des sportifs.

FISCALITÉ SUISSE DES SPORTIFS :
Taux spécial jusqu'à 7% (impôt fédéral) selon le revenu journalier + impôts cantonaux/communaux (ex: Zurich +10%). Les résidents fiscaux suisses peuvent opter pour l'imposition forfaitaire (dépenses) sous conditions strictes : nationalité non-suisse, première résidence fiscale ou absence >10 ans, pas d'activité commerciale en Suisse — RARE dans le sport. Non-résidents : impôt à la source sur le revenu net des performances physiques professionnelles en Suisse. Déductions forfaitaires : 20% du revenu brut (justifier les coûts supérieurs). Droits à l'image : les redevances d'entreprises suisses pour l'exploitation des droits à l'image ne sont généralement PAS soumises à l'impôt anticipé suisse. Mises à jour 2026 : l'AFC a publié le 21 novembre 2025 les listes actualisées (IFD, TVA, impôt anticipé, droits de timbre pour 2026-2028).

PLANIFICATION FINANCIÈRE DE CARRIÈRE SPORTIVE :
Tu planifies sur la durée de carrière (courte : 10-15 ans en moyenne). Épargne structurée : 2e pilier (LPP — prévoyance professionnelle, contribution employeur+employé), 3e pilier A (max CHF 7'056/an en 2025 pour salariés avec 2e pilier, CHF 35'280 pour indépendants sans 2e pilier), 3e pilier B (libre, pas déductible mais flexible). Tu recommandes de constituer 6-12 mois de réserve d'urgence. Investissements diversifiés dès les premiers revenus significatifs.

STATUT PROFESSIONNEL :
Salarié (contrat avec club) vs indépendant (sports individuels). Les implications fiscales et sociales sont très différentes (AVS, AI, APG, allocations familiales). Indépendant = responsabilité propre pour la prévoyance, TVA si CA >100'000 CHF. Tu aides à structurer la rémunération (salaire + primes + droits d'image + revenus sponsoring).

ASSURANCES SPORTIVES :
Assurance accidents obligatoire (LAA), assurance maladie complémentaire pour sportifs (couverture à l'étranger), assurance perte de gain (IJM), assurance invalidité complémentaire (cruciale pour les sportifs dont le capital est physique). Tu recommandes d'évaluer le besoin d'une assurance spécifique "fin de carrière" ou "blessure grave".

BUDGET & DÉPENSES :
Tu aides à budgétiser : frais d'entraînement, équipement, déplacements/compétitions, nutrition/suppléments, staff (coach, physio, mental), cotisations fédérations/clubs. Déductions fiscales possibles : frais professionnels directs, déplacements, hébergement en compétition, matériel sportif.`,
      comptabilite: `Tu es Pierre, comptable et fiduciaire spécialisé pour sportifs en Suisse, à jour sur les réglementations 2025-2026. Tu connais les obligations fiscales, la TVA, les déductions possibles pour sportifs dans le canton ${p.canton || 'suisse'}.

OBLIGATIONS FISCALES :
Tu rappelles les échéances cantonales (déclaration d'impôts, acomptes provisionnels, décomptes TVA trimestriels ou semestriels). Tu sais quels justificatifs conserver : factures équipement, billets de transport, notes d'hôtel en compétition, honoraires staff, frais médicaux liés au sport, cotisations fédérations. Durée de conservation : 10 ans minimum en Suisse.

TVA :
Assujettissement obligatoire si chiffre d'affaires >100'000 CHF/an. Méthode effective (déduction TVA sur achats) vs méthode forfaitaire (taux de dette fiscale nette selon branche). Les primes de course et prix sont généralement exonérés de TVA. Les revenus de sponsoring sont soumis à la TVA (prestation publicitaire). Droits d'image : TVA applicable si exploitation commerciale en Suisse.

DÉDUCTIONS POUR SPORTIFS :
Frais professionnels déductibles : matériel sportif (amortissement), déplacements professionnels (train, avion, km voiture à 0.70 CHF/km), hébergement en compétition/stage, frais de formation continue, cotisations à la fédération/club, honoraires coach/physio/nutritionniste (si nécessaires à l'activité), frais de représentation (dress code événements sponsors), assurances professionnelles. Frais de santé : déductibles uniquement la partie dépassant la franchise d'impôt.

COMPTABILITÉ PRATIQUE :
Tu proposes une organisation simple : compte bancaire séparé pro/perso, app de scan de reçus, catégorisation mensuelle des dépenses. Tu aides à préparer le dossier pour le fiduciaire. Tu alertes sur les erreurs courantes : oublier de déclarer les revenus étrangers, mal catégoriser les primes (revenu vs prix non imposable), ignorer les revenus en nature (équipement offert par sponsors = avantage imposable).

STATUT INDÉPENDANT :
Inscription à la caisse de compensation AVS/AI/APG, calcul des cotisations sociales (environ 10% du revenu net), provision pour impôts (recommandation : mettre de côté 25-35% de chaque revenu selon le canton). Bilan et compte de résultat annuels si tenue comptable complète requise.`,
      marketing: `Tu es Alex, expert en personal branding et marketing sportif digital, à jour sur les algorithmes et tendances 2025-2026. Tu proposes des stratégies de contenu adaptées au ${p.sport || 'sport'} et au calendrier d'événements. Tu analyses les opportunités de visibilité et aides à construire une image de marque cohérente.

ALGORITHMES RÉSEAUX SOCIAUX 2025-2026 :
Instagram 2026 : priorité aux Reels et carrousels sur le contenu statique. Passage du "follow graph" au "interest graph" — les abonnés ne garantissent plus la portée. Signaux de classement clés : partages par vue (surtout en DM = signal de valeur), sauvegardes (intention forte), analyse des mots-clés audio pour la catégorisation et le classement de recherche. TikTok 2026 : IA prédictive qui anticipe l'intérêt avant les recherches. Le nombre d'abonnés est fonctionnellement non pertinent — chaque vidéo est évaluée auprès d'un petit public test puis étendue progressivement. Seuil de taux de complétion pour la seconde promotion : ~70% (plus élevé qu'avant).

PERSONAL BRANDING ATHLÉTIQUE :
Format n°1 : contenu vidéo. Plateformes essentielles : Instagram (vidéos de performance + personnalité + vie hors sport), Twitter/Threads (pensées authentiques), LinkedIn (marques et décideurs regardent). Types de contenu : éducatif (tips, tutoriels), inspirant (stories motivantes), divertissant (moments fun, challenges, collaborations). Fondation : établir une identité particulière et la communiquer efficacement est l'étape la plus importante. Valeur long terme : une marque personnelle forte crée des opportunités qui persistent au-delà de la carrière compétitive.

FRAMEWORK DE CONTENU :
Règle 80/20 : 80% de valeur (éducation, inspiration, divertissement) / 20% de promotion. Calendrier éditorial aligné sur le calendrier sportif : pré-compétition (préparation, objectifs), compétition (behind-the-scenes, résultats, émotions), post-compétition (analyse, récupération, leçons), hors-saison (lifestyle, formation, coulisses). Formats qui performent : Reels 15-30s (hook en 1s), carrousels éducatifs (5-7 slides), stories quotidiennes (authenticité), lives (Q&A, entraînement en direct).

NIL (NAME, IMAGE, LIKENESS) — Tendances 2025-2026 :
Le marché du marketing NIL passe de 234 millions à ~1 milliard USD (2025-26). 60%+ des athlètes NCAA ont reçu au moins 1 offre NIL. Les deals ne sont plus limités au sport : nutrition, tech startups, plateformes d'étude investissent. En Suisse, les droits à l'image sont protégés par le Code Civil (art. 28) et la LPDS. Tu aides l'athlète à valoriser ses droits d'image et à structurer ses partenariats.

COMMUNITY BUILDING :
Engagement > reach. Répondre aux commentaires dans les 30 premières minutes. Créer une communauté de niche autour du sport et des valeurs. User-generated content (encourager les fans à créer du contenu). Collaborations avec d'autres athlètes/influenceurs de même taille. En Suisse : communauté sportive connectée, multilinguisme (FR/DE/IT) comme atout pour le reach.

SPÉCIFICITÉS PADEL :
Sport en forte croissance médiatique, très instagrammable, communauté engagée. Contenu autour des matchs, du lifestyle padel, networking sur et hors terrain. Les fans suivent les athlètes d'abord, les équipes ensuite.`,
      sponsors: `Tu es Marc, spécialiste en sponsoring sportif avec expertise du marché suisse et international, à jour sur les tendances 2025-2026. Tu aides à prospecter, négocier et maintenir des partenariats. Tu adaptes tes conseils au niveau (${p.level || '?'}), au sport (${p.sport || '?'}) et aux performances récentes.

MICRO-INFLUENCEUR ATHLÈTE :
Les athlètes avec 1'000-50'000 abonnés engagés ont plus de valeur par follower que les méga-influenceurs. Authenticité + communauté de niche = taux de conversion supérieur. Tu aides à positionner l'athlète comme micro-influenceur dans sa niche sportive et à attirer des marques ciblées.

ACTIVATIONS DIGITALES :
Contenu co-créé (athlète + marque), takeovers Instagram/TikTok, unboxing d'équipement, challenges sponsorisés, codes promo trackés, behind-the-scenes en compétition avec le produit, témoignages authentiques.

      contrats: `Tu es Léa, juriste spécialisée en droit du sport suisse et international, à jour sur la législation 2025-2026. Tu aides avec les contrats, les droits d'image, les assurances et les aspects légaux. Tu es précise et rigoureuse tout en restant accessible.

CADRE JURIDIQUE DU SPORT SUISSE :

TAS (TRIBUNAL ARBITRAL DU SPORT) — LAUSANNE :
Instance de règlement des litiges sportifs internationaux créée en 1984, siège à Lausanne (+ NYC et Sydney). Plus de 12'000 affaires enregistrées depuis sa création, ~900/an. Code TAS effectif au 1er juillet 2025. Taxe de dépôt : CHF 1'000. Types d'affaires : litiges d'emploi, dopage, élections, matchs truqués, éligibilité, gouvernance, comportement non éthique. 450+ arbitres experts. Langues de travail : français, anglais, espagnol. Tu sais rédiger des requêtes d'arbitrage et conseiller sur la procédure.

ANTIDOPAGE — CODE MONDIAL WADA :
Liste des interdictions 2025 (en vigueur depuis le 1er janvier 2025) : pas de changement majeur de statut, mais nouvelles substances ajoutées (S-107 et S48168/ARM210 comme stabilisateurs du complexe récepteur ryanodine-1-calstabine en S0). Formotérol inhalé : maximum 36 microgrammes sur toute période de 12 heures. Tramadol interdit en compétition depuis le 1er janvier 2024 (narcotique, performance prouvée). Code 2027 en cours d'approbation (6e Conférence mondiale, décembre 2025), effectif au 1er janvier 2027. Tu connais les procédures d'AUT (Autorisation d'Usage à des fins Thérapeutiques), les contrôles antidopage, les passeports biologiques, et les sanctions.

DROITS À L'IMAGE EN DROIT SUISSE :

CONTRATS SPORTIFS :

AGENTS SPORTIFS :

// ── FILE ATTACHMENT HANDLING ────────────────────────
async function handleFileSelect(page, event) {
  const t = T[currentLang];
  const file = event.target.files[0];
  if (!file) return;

  // Check file size (max 20MB)
  const maxSize = 20 * 1024 * 1024;
  if (file.size > maxSize) {
    alert(t.fileTooLarge);
    event.target.value = '';
    return;
  }

  // Check file type
  const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'application/pdf',
    'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', 'text/plain'];
  if (!allowedTypes.includes(file.type)) {
    alert(t.fileUnsupported);
    event.target.value = '';
    return;
  }

  // Convert file to base64
  const reader = new FileReader();
  reader.onload = (e) => {
    attachedFile = {
      name: file.name,
      type: file.type,
      size: file.size,
      data: e.target.result // base64 data
    };

    // Show preview
    updateFilePreview(page);
  };
  reader.readAsDataURL(file);
}

function updateFilePreview(page) {
  const previewArea = document.getElementById('filePreviewArea');
  if (!previewArea) return;

  if (!attachedFile) {
    previewArea.innerHTML = '';
    return;
  }

  const isImage = attachedFile.type.startsWith('image/');
  const fileName = attachedFile.name;
  const fileSize = attachedFile.size < 1024*1024
    ? Math.round(attachedFile.size/1024) + ' KB'
    : (attachedFile.size/(1024*1024)).toFixed(1) + ' MB';

  let previewHTML = `<div class="file-preview">`;
  previewHTML += `<span class="file-preview-remove" onclick="clearAttachedFile()">✕</span>`;

  if (isImage) {
    previewHTML += `<img src="${attachedFile.data}" class="file-preview-img" />`;
  }

  previewHTML += `<div class="file-preview-item">
    ${isImage ? '🖼️' : '📄'} ${fileName} · ${fileSize}
  </div></div>`;

  previewArea.innerHTML = previewHTML;
}

function clearAttachedFile() {
  attachedFile = null;
  const previewArea = document.getElementById('filePreviewArea');
  if (previewArea) previewArea.innerHTML = '';
}

        <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
          <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ef4444);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:white;flex-shrink:0">
            ${name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2)}
          </div>
          <div>
            <div style="font-size:18px;font-weight:800;color:var(--text)">${name}</div>
            <div style="font-size:13px;color:var(--muted);margin-top:2px">${currentUser.email}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          ${[
            ['⚽ ' + t.sport, p.sport || '—'],
            ['🏅 ' + t.currentLevel, p.level ? `${levelEmojis[p.level]||''} ${p.level}` : '—'],
            ['🎂 ' + t.birthDate, p.birth_date ? new Date(p.birth_date).toLocaleDateString('fr-CH') : '—'],
            ['🎯 ' + t.position, p.position || '—'],
            ['🏟️ ' + t.club, p.club || '—'],
            ['📍 ' + t.canton, p.canton || '—'],
          ].map(([label, val]) => `
            <div style="background:var(--bg2);border-radius:8px;padding:12px 14px">
              <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${label}</div>
              <div style="font-size:14px;font-weight:600;color:var(--text)">${val}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:20px">
        <div style="font-size:13px;font-weight:700;margin-bottom:12px">💬 ${t.conversationsWithAgents}</div>
        <div id="chatStats" style="font-size:13px;color:var(--muted)">${t.loading}</div>
      </div>
    </div>
  `;

  // Load chat stats
  sb.from('messages').select('agent_id').eq('user_id', currentUser.id).then(({ data }) => {
    const stats = document.getElementById('chatStats');
    if (!data || data.length === 0) {
      stats.innerHTML = t.noConversationsYet;
      return;
    }
    const counts = data.reduce((acc, m) => { acc[m.agent_id] = (acc[m.agent_id]||0)+1; return acc; }, {});
    const agentNames = {marketing:'Alex',finance:'Sophie',sponsors:'Marc',contrats:'Léa',physique:'David',mental:'Emma',nutrition:'Clara',comptabilite:'Pierre',sommeil:'Nora',recuperation:'Julie',equipe:'Lucas'};
    stats.innerHTML = Object.entries(counts).map(([id, count]) =>
      `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
        <span>${agentNames[id]||id}</span>
        <span style="color:var(--gold);font-weight:700">${count} messages</span>
      </div>`
    ).join('') + `<div style="margin-top:10px;font-size:11px;color:var(--muted)">${t.totalMessages.replace('${data.length}', data.length)}</div>`;
  });
}

// ── CALENDRIER SPORTIF ──────────────────────────────
let calendarEvents = [];
let calendarMonth = new Date().getMonth();
let calendarYear = new Date().getFullYear();
let calendarView = 'month'; // 'month' or 'week'
let calendarWeekStart = (() => { const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() - ((d.getDay()+6)%7)); return d; })();

const EVENT_TYPES = {
  match: { emoji: '⚽', color: '#ef4444', label: 'Match' },
  competition: { emoji: '🏆', color: '#f59e0b', label: 'Compétition' },
  entrainement: { emoji: '🏋️', color: '#10b981', label: 'Entraînement' },
  autre: { emoji: '📌', color: '#6366f1', label: 'Autre' }
};

const INTENSITY = {
  legere: { label: 'Légère', color: '#84cc16', icon: '🟢' },
  moyenne: { label: 'Moyenne', color: '#f59e0b', icon: '🟡' },
  intense: { label: 'Intense', color: '#ef4444', icon: '🔴' }
};

async function loadCalendarEvents() {
  const { data } = await sb.from('calendar_events')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('event_date', { ascending: true });
  calendarEvents = data || [];
}

async function renderCalendar() {
  const t = T[currentLang];
  await loadCalendarEvents();
  const today = new Date(); today.setHours(0,0,0,0);

  // Next event for countdown
  const nextEvent = calendarEvents.find(e => new Date(e.event_date) >= today);

  // Past events needing recap
  const needsRecap = calendarEvents.filter(e => {
    const d = new Date(e.event_date);
    return d < today && !e.recap_done && (e.event_type === 'match' || e.event_type === 'competition' || e.event_type === 'entrainement');
  }).slice(0, 3);

  // Week intensity map
  const weekEvents = calendarEvents.filter(e => {
    const d = new Date(e.event_date);
    const weekAhead = new Date(today.getTime() + 7 * 86400000);
    return d >= today && d < weekAhead;
  });
  const weekIntensity = weekEvents.reduce((sum, e) => sum + (e.intensity === 'intense' ? 3 : e.intensity === 'legere' ? 1 : 2), 0);
  const weekLoadLevels = [t.intensityLight, t.intensityLight, t.intensityMedium, t.intensityHigh, t.intensityHigh];
  const weekLoad = weekIntensity <= 3 ? t.intensityLight : weekIntensity <= 7 ? t.intensityMedium : weekIntensity <= 12 ? t.intensityHigh : 'Très ' + t.intensityHigh.toLowerCase();
  const weekLoadColor = weekIntensity <= 3 ? '#84cc16' : weekIntensity <= 7 ? '#f59e0b' : '#ef4444';

  document.getElementById('mainContent').innerHTML = `
    <div style="max-width:800px">

      <!-- COUNTDOWN -->
      ${nextEvent ? (() => {
        const evDate = new Date(nextEvent.event_date + (nextEvent.event_time ? 'T' + nextEvent.event_time : 'T00:00:00'));
        const diff = evDate - new Date();
        const days = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        const t = EVENT_TYPES[nextEvent.event_type] || EVENT_TYPES.autre;
        return `
        <div style="background:linear-gradient(135deg,${t.color}15,${t.color}05);border:1px solid ${t.color}30;border-radius:14px;padding:20px;margin-bottom:16px;text-align:center">
          <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Prochain événement</div>
          <div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px">${t.emoji} ${nextEvent.title}</div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:14px">${nextEvent.location ? nextEvent.location + ' · ' : ''}${new Date(nextEvent.event_date).toLocaleDateString('fr-CH',{weekday:'long',day:'numeric',month:'long'})}${nextEvent.event_time ? ' à ' + nextEvent.event_time.slice(0,5) : ''}</div>
          <div style="display:flex;justify-content:center;gap:12px">
            ${days > 0 ? `<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 16px;min-width:60px"><div style="font-size:24px;font-weight:900;color:${t.color}">${days}</div><div style="font-size:9px;color:var(--muted);font-weight:600">JOURS</div></div>` : ''}
            <div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 16px;min-width:60px"><div style="font-size:24px;font-weight:900;color:${t.color}">${hours}</div><div style="font-size:9px;color:var(--muted);font-weight:600">HEURES</div></div>
            <div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 16px;min-width:60px"><div style="font-size:24px;font-weight:900;color:${t.color}">${mins}</div><div style="font-size:9px;color:var(--muted);font-weight:600">MIN</div></div>
          </div>
        </div>`;
      })() : ''}

      <!-- RECAP POST-EVENT -->
      ${needsRecap.map(e => {
        const t = EVENT_TYPES[e.event_type] || EVENT_TYPES.autre;
        return `
        <div style="background:linear-gradient(135deg,#6366f115,#6366f105);border:1px solid #6366f130;border-radius:14px;padding:16px;margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <div style="font-size:22px">${t.emoji}</div>
            <div>
              <div style="font-size:13px;font-weight:700;color:var(--text)">Comment s'est passé "${e.title}" ?</div>
              <div style="font-size:11px;color:var(--muted)">Ajoutez votre récap pour que vos agents s'améliorent</div>
            </div>
          </div>
          <button onclick="showRecapModal('${e.id}','${e.title.replace(/'/g,"\\'")}','${e.event_type}','${e.event_date}')"
            style="width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">
            Faire le récap →
          </button>
        </div>`;
      }).join('')}

      <!-- CHARGE HEBDO -->
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:11px;color:var(--muted);font-weight:600">${t.weeklyLoad}</div>
          <div style="font-size:15px;font-weight:800;color:${weekLoadColor};margin-top:2px">${weekLoad}</div>
        </div>
        <div style="display:flex;gap:3px;align-items:flex-end;height:32px">
          ${weekEvents.map(e => {
            const h = e.intensity === 'intense' ? 32 : e.intensity === 'legere' ? 12 : 22;
            const c = INTENSITY[e.intensity||'moyenne']?.color || '#f59e0b';
            return `<div title="${e.title}" style="width:14px;height:${h}px;border-radius:3px;background:${c}"></div>`;
          }).join('')}
          ${weekEvents.length === 0 ? '<div style="font-size:11px;color:var(--muted)">Aucun événement</div>' : ''}
        </div>
        <div style="text-align:right">
          <div style="font-size:20px;font-weight:900;color:var(--text)">${weekEvents.length}</div>
          <div style="font-size:9px;color:var(--muted)">${t.events}</div>
        </div>
      </div>

      <!-- VIEW TOGGLE -->
      <div style="display:flex;gap:4px;margin-bottom:16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px">
        <button onclick="calendarView='month';renderCalendar()" style="flex:1;padding:8px;border-radius:6px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;${calendarView==='month'?'background:var(--bg3);color:var(--text)':'background:transparent;color:var(--muted)'}">📅 Mois</button>
        <button onclick="calendarView='week';renderCalendar()" style="flex:1;padding:8px;border-radius:6px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;${calendarView==='week'?'background:var(--bg3);color:var(--text)':'background:transparent;color:var(--muted)'}">📋 ${t.week}</button>
      </div>

      ${calendarView === 'month' ? renderMonthView(today) : renderWeekView(today)}

      <!-- ADD EVENT -->
      <button onclick="showAddEvent('${today.toISOString().split('T')[0]}')"
        style="width:100%;padding:14px;border-radius:12px;border:1px dashed var(--border);background:transparent;color:var(--gold);font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;margin-bottom:16px"
        onmouseover="this.style.background='var(--bg3)';this.style.borderColor='var(--gold)'"
        onmouseout="this.style.background='transparent';this.style.borderColor='var(--border)'">
        ${t.addEvent}
      </button>

      <!-- LEGEND -->
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:8px">
        ${Object.entries(EVENT_TYPES).map(([k,v]) => `<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)"><div style="width:7px;height:7px;border-radius:50%;background:${v.color}"></div>${v.emoji} ${v.label}</div>`).join('')}
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
        ${Object.entries(INTENSITY).map(([k,v]) => `<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)">${v.icon} ${v.label}</div>`).join('')}
      </div>
    </div>
  `;
}

function renderMonthView(today) {
  const t = T[currentLang];
  const monthNames = t.monthNames;
  const dayNames = t.dayNamesShort;
  const firstDay = new Date(calendarYear, calendarMonth, 1);
  let startDay = firstDay.getDay() - 1;
  if (startDay < 0) startDay = 6;
  const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();

  let grid = '';
  for (let i = 0; i < startDay; i++) grid += '<div></div>';
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${calendarYear}-${String(calendarMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dayDate = new Date(calendarYear, calendarMonth, day);
    const isToday = dayDate.getTime() === today.getTime();
    const dayEvts = calendarEvents.filter(e => e.event_date === dateStr);
    const hasEvents = dayEvts.length > 0;
    const maxIntensity = dayEvts.reduce((max, e) => { const v = e.intensity === 'intense' ? 3 : e.intensity === 'legere' ? 1 : 2; return v > max ? v : max; }, 0);
    const intensityBorder = maxIntensity === 3 ? '#ef444440' : maxIntensity === 1 ? '#84cc1640' : maxIntensity === 2 ? '#f59e0b40' : 'transparent';

    grid += `
      <div onclick="${hasEvents ? `showDayDetail('${dateStr}')` : `showAddEvent('${dateStr}')`}" style="position:relative;padding:6px 4px;border-radius:8px;text-align:center;cursor:pointer;transition:all 0.2s;
        ${isToday ? 'background:linear-gradient(135deg,#f59e0b20,#d9770610);border:1px solid #f59e0b40' : hasEvents ? 'border:1px solid ' + intensityBorder : 'border:1px solid transparent'}; min-height:48px"
        onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background='${isToday ? 'linear-gradient(135deg,#f59e0b20,#d9770610)' : 'transparent'}'">
        <div style="font-size:12px;font-weight:${isToday ? '800' : '500'};color:${isToday ? 'var(--gold)' : 'var(--text)'}">${day}</div>
        ${hasEvents ? `<div style="display:flex;gap:2px;justify-content:center;margin-top:3px;flex-wrap:wrap">${dayEvts.map(e => `<div style="width:6px;height:6px;border-radius:50%;background:${EVENT_TYPES[e.event_type]?.color || '#6366f1'}"></div>`).join('')}</div>` : ''}
      </div>`;
  }

  return `
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <button onclick="changeMonth(-1)" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);cursor:pointer;font-family:'Inter',sans-serif;font-weight:700;font-size:14px">←</button>
        <div style="font-size:16px;font-weight:800;color:var(--text)">${monthNames[calendarMonth]} ${calendarYear}</div>
        <button onclick="changeMonth(1)" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);cursor:pointer;font-family:'Inter',sans-serif;font-weight:700;font-size:14px">→</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px">
        ${dayNames.map(d => `<div style="text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${grid}</div>
    </div>`;
}

function renderWeekView(today) {
  const t = T[currentLang];
  const dayNames = t.dayNamesFull;
  const hours = ['06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'];
  const ws = new Date(calendarWeekStart);

  let weekDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    const dateStr = d.toISOString().split('T')[0];
    const dayEvts = calendarEvents.filter(e => e.event_date === dateStr);
    weekDays.push({ date: d, dateStr, name: dayNames[i], dayNum: d.getDate(), events: dayEvts, isToday: d.getTime() === today.getTime() });
  }

  const monthAbbrs = ['jan','fév','mar','avr','mai','juin','juil','août','sept','oct','nov','déc'];
  const weekLabel = `${ws.getDate()} ${monthAbbrs[ws.getMonth()]} — ${weekDays[6].date.getDate()} ${monthAbbrs[weekDays[6].date.getMonth()]} ${ws.getFullYear()}`;

  return `
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <button onclick="calendarWeekStart.setDate(calendarWeekStart.getDate()-7);renderCalendar()" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);cursor:pointer;font-family:'Inter',sans-serif;font-weight:700">←</button>
        <div style="font-size:14px;font-weight:800;color:var(--text)">${weekLabel}</div>
        <button onclick="calendarWeekStart.setDate(calendarWeekStart.getDate()+7);renderCalendar()" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);cursor:pointer;font-family:'Inter',sans-serif;font-weight:700">→</button>
      </div>
      ${weekDays.map(day => `
        <div style="margin-bottom:8px;border-radius:10px;${day.isToday ? 'background:#f59e0b08;border:1px solid #f59e0b25' : 'border:1px solid var(--border)'}">
          <div onclick="${day.events.length > 0 ? `showDayDetail('${day.dateStr}')` : `showAddEvent('${day.dateStr}')`}" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:36px;height:36px;border-radius:8px;${day.isToday ? 'background:linear-gradient(135deg,#f59e0b,#d97706);color:#07091a' : 'background:var(--bg);color:var(--text)'};display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0">
                <div style="font-size:13px;font-weight:800;line-height:1">${day.dayNum}</div>
                <div style="font-size:8px;font-weight:600;opacity:0.7">${day.name.slice(0,3)}</div>
              </div>
              ${day.events.length > 0 ? `
                <div style="display:flex;flex-direction:column;gap:4px">
                  ${day.events.map(e => {
                    const t = EVENT_TYPES[e.event_type] || EVENT_TYPES.autre;
                    const intens = INTENSITY[e.intensity||'moyenne'];
                    return `<div style="display:flex;align-items:center;gap:6px">
                      <span style="font-size:12px">${t.emoji}</span>
                      <span style="font-size:12px;font-weight:600;color:var(--text)">${e.title}</span>
                      ${e.event_time ? `<span style="font-size:10px;color:var(--muted)">${e.event_time.slice(0,5)}</span>` : ''}
                      <span style="font-size:9px">${intens?.icon||'🟡'}</span>
                    </div>`;
                  }).join('')}
                </div>
              ` : '<div style="font-size:11px;color:var(--muted);font-style:italic">Aucun événement</div>'}
            </div>
            <div style="font-size:14px;color:var(--muted);opacity:0.4">›</div>
          </div>
        </div>
      `).join('')}
    </div>`;
}

function changeMonth(dir) {
  calendarMonth += dir;
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
  if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
  renderCalendar();
}

async function showDayDetail(dateStr) {
  const existing = document.getElementById('eventModal');
  if (existing) existing.remove();

  const dayEvents = calendarEvents.filter(e => e.event_date === dateStr);
  const d = new Date(dateStr + 'T00:00:00');
  const dayLabel = d.toLocaleDateString('fr-CH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  // Fetch weather for this day
  const location = dayEvents.find(e => e.location)?.location || userProfile?.canton || 'Lausanne';
  const weather = await getWeather(location, dateStr);

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'eventModal';
  modal.innerHTML = `
    <div class="modal-box" style="max-width:440px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:28px;margin-bottom:8px">📅</div>
          <div class="modal-title" style="text-transform:capitalize">${dayLabel}</div>
          <div class="modal-sub">${dayEvents.length} événement${dayEvents.length > 1 ? 's' : ''}</div>
        </div>
        ${weather ? `
          <div style="text-align:center;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;flex-shrink:0">
            <div style="font-size:24px">${weather.icon}</div>
            <div style="font-size:13px;font-weight:800;color:var(--text)">${weather.tMax}°</div>
            <div style="font-size:10px;color:var(--muted)">${weather.tMin}° min</div>
            ${weather.rain > 20 ? `<div style="font-size:9px;color:#3b82f6;font-weight:600;margin-top:2px">💧 ${weather.rain}%</div>` : ''}
          </div>
        ` : ''}
      </div>

      <div style="margin:16px 0">
        ${dayEvents.map(e => {
          const t = EVENT_TYPES[e.event_type] || EVENT_TYPES.autre;
          const intens = INTENSITY[e.intensity||'moyenne'];
          return `
            <div style="background:${t.color}08;border:1px solid ${t.color}25;border-radius:12px;padding:16px;margin-bottom:10px">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <div style="display:flex;align-items:center;gap:8px">
                  <div style="width:32px;height:32px;border-radius:8px;background:${t.color}20;display:flex;align-items:center;justify-content:center;font-size:16px">${t.emoji}</div>
                  <div>

function selectEventType(btn, type) {

  selectedEventType = type;
}
function selectIntensity(btn, level) {

async function saveEvent() {
  const title = document.getElementById('evTitle').value.trim();
  const date = document.getElementById('evDate').value;
  const time = document.getElementById('evTime').value || null;
  const duration = parseInt(document.getElementById('evDuration')?.value || '90');
  const location = document.getElementById('evLocation').value.trim() || null;
  const notes = document.getElementById('evNotes').value.trim() || null;

  if (!title || !date) return alert('Veuillez remplir le titre et la date.');

  const { error } = await sb.from('calendar_events').insert({
    user_id: currentUser.id,
    title,
    event_type: selectedEventType,
    event_date: date,
    event_time: time,
    duration_minutes: duration,
    location,
    notes,
    intensity: selectedIntensity
  });

  if (error) return alert('Erreur: ' + error.message);
  document.getElementById('eventModal')?.remove();
  renderCalendar();
}

async function updateEvent(id) {
  const title = document.getElementById('evTitle').value.trim();
  const date = document.getElementById('evDate').value;
  const time = document.getElementById('evTime').value || null;
  const location = document.getElementById('evLocation').value.trim() || null;
  const notes = document.getElementById('evNotes').value.trim() || null;

  if (!title || !date) return alert('Veuillez remplir le titre et la date.');

  const { error } = await sb.from('calendar_events').update({
    title,
    event_type: selectedEventType,
    event_date: date,
    event_time: time,
    location,
    notes,
    intensity: selectedIntensity
  }).eq('id', id);

  if (error) return alert('Erreur: ' + error.message);
  document.getElementById('eventModal')?.remove();
  showToast('✅ Événement modifié !');
  renderCalendar();
}

async function deleteEvent(id) {
  if (!confirm('Supprimer cet événement ?')) return;
  await sb.from('calendar_events').delete().eq('id', id);
  // Remove from local array immediately for instant UI update
  calendarEvents = calendarEvents.filter(e => e.id !== id);
  document.getElementById('eventModal')?.remove();
  showToast('🗑 Événement supprimé');
  await renderCalendar();
}

let recapMood = 'bien';
let recapSleep = 'bon';
let recapNutrition = 'normal';
let recapInjury = 'aucune';

function selectRecapField(btn, field, value) {
  btn.closest('.form-field').querySelectorAll('.sport-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  if (field === 'recapSleep') recapSleep = value;
  else if (field === 'recapNutrition') recapNutrition = value;
  else if (field === 'recapInjury') recapInjury = value;
}

function selectPerformance(n) {
  recapPerformance = n;
  for (let i = 1; i <= 10; i++) {
    const btn = document.getElementById('star' + i);
    if (btn) {
      btn.style.background = i <= n ? 'linear-gradient(135deg,#f59e0b,#d97706)' : 'var(--bg)';
      btn.style.color = i <= n ? '#07091a' : 'var(--muted)';
      btn.style.borderColor = i <= n ? '#f59e0b' : 'var(--border)';
    }
  }
}

function selectPhysical(btn, state) {
  btn.closest('.form-field').querySelectorAll('.sport-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  recapPhysical = state;
}

  recapMood = mood;

    performance_note: recapPerformance,
    physical_state: recapPhysical,
    mood: recapMood,
    sleep_quality: recapSleep,
    pre_nutrition: recapNutrition,
    injury: recapInjury,
    strengths,
    weaknesses,
    recap_notes: notes,
    recap_done: true
  }).eq('id', eventId);
  if (error) return alert('Erreur: ' + error.message);
  document.getElementById('eventModal')?.remove();
  showToast('✅ Récap enregistré ! Vos agents en tiendront compte.');

  recapPerformance = 7; recapPhysical = 'normal'; recapMood = 'bien';
  recapSleep = 'bon'; recapNutrition = 'normal'; recapInjury = 'aucune';
  renderCalendar();
}

      equipe: { name: 'Lucas', emoji: '💼', color: '#f59e0b' },

      sponsors: { name: 'Marc', emoji: '🤝', color: '#6366f1' },

    const addedAgents = new Set();
    futureEvents.forEach(evt => {
      const d = new Date(evt.event_date);

      const isMatch = evt.event_type === 'match' || evt.event_type === 'competition';
      const isTraining = evt.event_type === 'entrainement';

      if (isMatch) {
        if (!addedAgents.has('mental')) {
          suggestions.push({ page: 'mental', ...agentInfo.mental, reason: `Prépare ta routine mentale pour ${evt.title} (${when})` });

        }

          suggestions.push({ page: 'nutrition', ...agentInfo.nutrition, reason: `Optimise ta nutrition avant ${evt.title} (${when})` });
          addedAgents.add('nutrition');
        }
        if (!addedAgents.has('physique')) {
          suggestions.push({ page: 'physique', ...agentInfo.physique, reason: `Adapte ta prépa physique pour ${evt.title} (${when})` });
          addedAgents.add('physique');
        }
      }
      if (isTraining && !addedAgents.has('physique')) {
        suggestions.push({ page: 'physique', ...agentInfo.physique, reason: `Prépare ta séance : ${evt.title} (${when})` });

          suggestions.push({ page: 'contrats', ...agentInfo.contrats, reason: `Prépare ton RDV : ${evt.title} (${when})` });
          addedAgents.add('contrats');
        }
      }

    // State-based suggestions (from daily log)

        '</div>';

    const eventsHTML = futureEvents.length > 0 ? futureEvents.slice(0, 5).map(e => {

    requestAnimationFrame(() => { overlay.style.opacity = '1'; });

    console.warn('Morning Brief error:', err);
  }
}

async function saveEveningBrief() {
  const btn = document.getElementById('eveningSaveBtn');
  if (btn) { btn.textContent = '💾 Sauvegarde...'; btn.style.opacity = '0.6'; }

  try {
    const now = new Date();
    const dateKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

    // Check existing log
    const { data: existing } = await sb.from('daily_log')
      .select('*').eq('user_id', currentUser.id).eq('log_date', dateKey).single();

    const logData = existing ? { ...existing } : { user_id: currentUser.id, log_date: dateKey };
    if (_eveningData.mood) logData.mood = _eveningData.mood;
    if (_eveningData.energy) logData.energy = _eveningData.energy;
    if (_eveningData.sleep_quality) logData.sleep_quality = _eveningData.sleep_quality;

    if (existing) {
      await sb.from('daily_log').update(logData).eq('id', existing.id);
    } else {
      await sb.from('daily_log').insert(logData);
    }

    // Success feedback
    var tt = T[currentLang]; if (btn) { btn.textContent = '✅ ' + (tt.briefSaved||'Enregistré !'); btn.style.background = '#10b981'; }
    setTimeout(() => closeEveningBrief(), 800);
  } catch(e) {
    console.warn('Evening save error:', e);
    if (btn) { btn.textContent = 'Erreur — réessaye'; btn.style.opacity = '1'; }
  }
}

function closeEveningBrief() {
  if (window._eveningBriefTimer) { clearTimeout(window._eveningBriefTimer); window._eveningBriefTimer = null; }
  const el = document.getElementById('eveningBrief');
  if (el) {
    el.style.transform = 'translateY(100%)';
    setTimeout(() => el.remove(), 400);
  }
  _eveningData = {};
}

// ── SPORTVISE SCORE (global composite) ──────────────
async function computeSportViseScore() {
  try {
    const today = new Date();
    const weekAgo = new Date(today.getTime() - 7 * 86400000);
    const twoWeeksAgo = new Date(today.getTime() - 14 * 86400000);

    // Get this week's logs
    const { data: logs } = await sb.from('daily_log')
      .select('*').eq('user_id', currentUser.id)
      .gte('log_date', weekAgo.toISOString().split('T')[0])
      .order('log_date', { ascending: false });

    if (!logs || logs.length < 1) return null;

    // Get previous week's logs for trend
    const { data: prevLogs } = await sb.from('daily_log')
      .select('*').eq('user_id', currentUser.id)
      .gte('log_date', twoWeeksAgo.toISOString().split('T')[0])
      .lt('log_date', weekAgo.toISOString().split('T')[0]);

    // Get recent recaps for performance data
    const { data: recaps } = await sb.from('calendar_events')
      .select('performance_note,physical_state,mood,sleep_quality,injury')
      .eq('user_id', currentUser.id).eq('recap_done', true)
      .gte('event_date', weekAgo.toISOString().split('T')[0]);

    // Calculate sub-scores (0-100)
    const physical = Math.round(logs.reduce((a, l) => a + Math.min(100, (l.energy || 5) * 12 + (l.training_done ? 20 : 0)), 0) / logs.length);
    const mental = Math.round(logs.reduce((a, l) => a + Math.min(100, (l.mood || 5) * 12 + (l.motivation || 5) * 8), 0) / logs.length);
    const nutrition = Math.round(logs.reduce((a, l) => a + Math.min(100, (l.nutrition_quality || 3) * 20), 0) / logs.length);
    const sleep = Math.round(logs.reduce((a, l) => a + Math.min(100, (l.sleep_quality || 3) * 20), 0) / logs.length);
    const recovery = Math.round(logs.reduce((a, l) => a + Math.min(100, 100 - ((l.pain_level || 0) * 20)), 0) / logs.length);

    // Bonus from recaps
    let perfBonus = 0;
    if (recaps && recaps.length > 0) {
      const avgPerf = recaps.reduce((a, r) => a + (r.performance_note || 5), 0) / recaps.length;
      perfBonus = Math.round((avgPerf - 5) * 3); // -15 to +15 bonus
    }

    // Regularity bonus (logging streak)
    const regularityBonus = Math.min(10, logs.length * 2);

    // Global score (weighted average + bonuses)
    const globalScore = Math.max(0, Math.min(100, Math.round(
      physical * 0.25 + mental * 0.20 + nutrition * 0.15 + sleep * 0.20 + recovery * 0.20 + perfBonus + regularityBonus
    )));

    // Previous week score for trend
    let prevScore = null;
    if (prevLogs && prevLogs.length > 0) {
      const pPhys = prevLogs.reduce((a, l) => a + Math.min(100, (l.energy || 5) * 12 + (l.training_done ? 20 : 0)), 0) / prevLogs.length;
      const pMental = prevLogs.reduce((a, l) => a + Math.min(100, (l.mood || 5) * 12 + (l.motivation || 5) * 8), 0) / prevLogs.length;
      prevScore = Math.round(pPhys * 0.25 + pMental * 0.20 + 50 * 0.15 + 50 * 0.20 + 80 * 0.20);
    }

    return {
      global: globalScore,
      physical, mental, nutrition, sleep, recovery,
      trend: prevScore !== null ? globalScore - prevScore : null,
      daysLogged: logs.length
    };
  } catch(err) { console.warn('Score error:', err); return null; }
}

// ── TEXT-TO-SPEECH (Chat Vocal) ─────────────────────
let currentSpeech = null;

function speakAgentMessage(page, index, btn) {
  // If already speaking, stop
  if (currentSpeech && speechSynthesis.speaking) {
    speechSynthesis.cancel();
    currentSpeech = null;
    btn.textContent = '🔊';
    btn.style.background = 'transparent';
    return;
  }

  const msg = chats[page]?.[index];
  if (!msg || !msg.text) return;

  // Clean text for speech (remove markdown, emojis excess, etc.)
  let text = msg.text
    .replace(/\*\*(.*?)\*\*/g, '$1')  // remove bold
    .replace(/\*(.*?)\*/g, '$1')       // remove italic
    .replace(/#{1,3}\s/g, '')           // remove headers
    .replace(/- /g, ', ')               // list items to commas
    .replace(/\n+/g, '. ')             // newlines to pauses
    .replace(/[📊🏋️🧠🥗😴♻️💪⚡🎯🏅📈💶📓]/g, '') // remove emojis
    .trim();

  if (!text) return;

  const utterance = new SpeechSynthesisUtterance(text);

  // Set language based on app language
  const langMap = { fr: 'fr-CH', de: 'de-CH', en: 'en-US', it: 'it-CH' };
  utterance.lang = langMap[currentLang] || 'fr-CH';
  utterance.rate = 0.95;
  utterance.pitch = 1.0;

  // Try to find a good voice
  const voices = speechSynthesis.getVoices();
  const agent = AGENTS[page];
  // Prefer Swiss French voices, fallback to any French
  const preferred = voices.find(v => v.lang === utterance.lang) ||
                    voices.find(v => v.lang.startsWith(utterance.lang.split('-')[0])) ||
                    voices[0];
  if (preferred) utterance.voice = preferred;

  // UI feedback
  btn.textContent = '⏹️';
  btn.style.background = '#6366f130';
  btn.style.color = '#6366f1';

  utterance.onend = () => {
    btn.textContent = '🔊';
    btn.style.background = 'transparent';
    btn.style.color = '#64748b';
    currentSpeech = null;
  };

  utterance.onerror = () => {
    btn.textContent = '🔊';
    btn.style.background = 'transparent';
    btn.style.color = '#64748b';
    currentSpeech = null;
  };

  currentSpeech = utterance;
  speechSynthesis.speak(utterance);
}

      } else {
        new Notification('SPORTVISE ☀️', {
          body: 'Nouvelle journée ! N\'oublie pas de remplir ton journal ce soir pour que tes agents puissent t\'accompagner au mieux.',
          icon: '/icons/icon-192.png',
          tag: 'morning-' + todayStr
        });
      }
      localStorage.setItem(key, '1');
    }

    // Hydration reminder (12:00-13:00 on training days)
    if (hour >= 12 && hour < 13) {
      const key = 'sv_hydration_' + todayStr;
      if (localStorage.getItem(key)) return;

      const { data: hydEvents } = await sb.from('calendar_events')
        .select('event_type, event_time').eq('user_id', currentUser.id)
        .eq('event_date', todayStr)
        .in('event_type', ['entrainement', 'match', 'competition']).limit(3);
      // Only notify if there's still a future event today
      const futureHydEvts = (hydEvents || []).filter(e => {
        if (!e.event_time) return true;
        const [eh] = e.event_time.split(':').map(Number);
        return now.getHours() < eh;
      });

      if (futureHydEvts.length > 0) {
        new Notification('SPORTVISE 💧 Clara rappelle', {
          body: 'Tu as une activité aujourd\'hui ! Pense à boire régulièrement. Objectif : au moins 2L avant ton effort.',
          icon: '/icons/icon-192.png',
          tag: 'hydration-' + todayStr
        });
        localStorage.setItem(key, '1');
      }
    }

    // Weekly recap notification (Monday 9:00)
    if (now.getDay() === 1 && hour >= 9 && hour < 10) {
      const key = 'sv_recap_' + todayStr;
      if (localStorage.getItem(key)) return;
      new Notification('SPORTVISE 📊 Lucas', {
        body: 'Ton récap hebdomadaire est prêt ! Ouvre SPORTVISE pour voir le bilan de ta semaine et les recommandations de tes agents.',
        icon: '/icons/icon-192.png',
        tag: 'recap-' + todayStr
      });
      localStorage.setItem(key, '1');
    }
  }, 7200000); // Every 2 hours
}

async function startProgram(id) {
  const programs = getMarketplacePrograms();
  const program = programs.find(p => p.id === id);
  if (!program) return;

  // Find the agent page for this program
  const agentPages = {
    'David': 'physique', 'Emma': 'mental', 'Clara': 'nutrition',
    'Nora': 'sommeil', 'Julie': 'recuperation', 'Alex': 'marketing'
  };
  const page = agentPages[program.agent];
  if (!page) return;

  // Save that this program was started
  let started = {};
  try { started = JSON.parse(localStorage.getItem(`sv_programs_${currentUser.id}`) || '{}'); } catch(e) {}
  started[id] = { startedAt: new Date().toISOString(), agent: program.agent };
  localStorage.setItem(`sv_programs_${currentUser.id}`, JSON.stringify(started));

  // Navigate to the agent and send the prompt
  showPage(page, document.querySelector(`[onclick="showPage('${page}',this)"]`));

  // Wait for chat to render then auto-send the prompt
  setTimeout(() => {
    const input = document.getElementById('chatInput');
    if (input) {
      input.value = program.prompt;
      sendMsg(page);
    }
  }, 500);
}

// ── WEATHER FOR EVENTS ──────────────────────────────
async function getWeather(location, date) {
  // Using Open-Meteo free API (no key needed)
  try {
    // Geocode Swiss cities roughly
    const swissCities = {
      'lausanne': {lat:46.52,lon:6.63}, 'geneve': {lat:46.20,lon:6.14}, 'zurich': {lat:47.37,lon:8.54},
      'berne': {lat:46.95,lon:7.45}, 'bale': {lat:47.56,lon:7.59}, 'lucerne': {lat:47.05,lon:8.31},
      'sion': {lat:46.23,lon:7.36}, 'fribourg': {lat:46.81,lon:7.15}, 'neuchatel': {lat:46.99,lon:6.93},
      'lugano': {lat:46.00,lon:8.95}, 'davos': {lat:46.80,lon:9.84}, 'st-gallen': {lat:47.42,lon:9.37},
      'winterthur': {lat:47.50,lon:8.72}, 'thun': {lat:46.76,lon:7.63}, 'montreux': {lat:46.43,lon:6.91},
      'yverdon': {lat:46.78,lon:6.64}, 'nyon': {lat:46.38,lon:6.24}, 'martigny': {lat:46.10,lon:7.07}
    };
    const loc = location.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    let coords = null;
    for (const [city, c] of Object.entries(swissCities)) {
      if (loc.includes(city)) { coords = c; break; }
    }
    if (!coords) coords = { lat: 46.52, lon: 6.63 }; // Default Lausanne

    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=Europe/Zurich&start_date=${date}&end_date=${date}`);
    const data = await res.json();
    if (data.daily) {
      const wc = data.daily.weathercode[0];
      const tMax = data.daily.temperature_2m_max[0];
      const tMin = data.daily.temperature_2m_min[0];
      const rain = data.daily.precipitation_probability_max[0];
      const weatherIcons = { 0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️', 45:'🌫️', 48:'🌫️', 51:'🌦️', 53:'🌧️', 55:'🌧️', 61:'🌧️', 63:'🌧️', 65:'🌧️', 71:'🌨️', 73:'🌨️', 75:'❄️', 80:'🌦️', 81:'🌧️', 82:'⛈️', 95:'⛈️' };
      return { icon: weatherIcons[wc] || '🌤️', tMax: Math.round(tMax), tMin: Math.round(tMin), rain };
    }
  } catch(e) { console.warn('Weather error:', e); }
  return null;
}

  const targetValue = parseInt(document.getElementById('goalTarget').value) || 0;

async function setJournalField(field, value, btn) {
  // INSTANT visual feedback before Supabase call
  if (btn) {
    var row = btn.parentElement;
    var isDark = !document.documentElement.getAttribute('data-theme') || document.documentElement.getAttribute('data-theme') === 'dark';
    Array.from(row.children).forEach(function(b) {
      b.classList.remove('active');
      b.style.background = isDark ? 'var(--bg)' : '#f8fafc';
      b.style.borderColor = isDark ? 'var(--border)' : '#e2e8f0';
      b.style.color = isDark ? 'var(--text)' : '#0f172a';
      b.style.transform = '';
      b.style.boxShadow = '';
    });
    btn.classList.add('active');
    btn.style.background = 'linear-gradient(135deg,#f59e0b,#d97706)';
    btn.style.borderColor = '#f59e0b';
    btn.style.color = '#07091a';
    btn.style.transform = 'scale(1.02)';
    btn.style.boxShadow = '0 2px 8px rgba(245,158,11,0.3)';
  }

  // Save to Supabase in background
  const now = new Date();
  const today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const { data: existing } = await sb.from('daily_log')
    .select('*')
    .eq('user_id', currentUser.id)
    .eq('log_date', today)
    .single();

  const data = existing ? { ...existing } : { user_id: currentUser.id, log_date: today };
  data[field] = value;

  existing
    ? sb.from('daily_log').update(data).eq('id', existing.id)
    : sb.from('daily_log').insert(data);
  // No re-render — feedback is already shown instantly
}

async function saveJournal() {
  const notes = document.getElementById('journalNotes').value;
  const today = new Date().toISOString().split('T')[0];

  const { data: existing } = await sb.from('daily_log')
    .select('*')
    .eq('user_id', currentUser.id)
    .eq('log_date', today)
    .single();

  if (existing) {
    await sb.from('daily_log').update({ notes }).eq('id', existing.id);
  }

  alert('Journal sauvegardé!');

}

// ── EXPORT CSV JOURNAL ──────────────────────────────
async function exportJournalCSV() {
  try {
    const { data: logs } = await sb.from('daily_log')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('log_date', { ascending: true });

    if (!logs || logs.length === 0) { alert('Aucune donnée à exporter.'); return; }

    const athleteName = userProfile?.full_name || 'Athlète';
    const headers = ['Date','Humeur (1-5)','Énergie (1-5)','Motivation (1-5)','Sommeil (1-5)','Douleurs (0-5)','Nutrition (1-5)','Entraînement','Fitness Score','Notes'];
    const rows = logs.map(l => [
      l.log_date,
      l.mood || '',
      l.energy || '',
      l.motivation || '',
      l.sleep_quality || '',
      l.pain_level ?? '',
      l.nutrition_quality || '',
      l.training_done ? 'Oui' : 'Non',
      computeFitnessScore(l) || '',
      '"' + (l.notes || '').replace(/"/g, '""') + '"'
    ]);

    let csv = '\uFEFF'; // BOM for Excel UTF-8
    csv += `SPORTVISE - Journal de ${athleteName}\n`;
    csv += `Exporté le ${new Date().toLocaleDateString('fr-CH')}\n\n`;
    csv += headers.join(';') + '\n';
    csv += rows.map(r => r.join(';')).join('\n');

    // Summary stats
    const avgMood = (logs.reduce((a,l)=>a+(l.mood||0),0)/logs.length).toFixed(1);
    const avgEnergy = (logs.reduce((a,l)=>a+(l.energy||0),0)/logs.length).toFixed(1);
    const avgSleep = (logs.reduce((a,l)=>a+(l.sleep_quality||0),0)/logs.length).toFixed(1);
    const trainDays = logs.filter(l=>l.training_done).length;
    csv += `\n\nRÉSUMÉ STATISTIQUES\n`;
    csv += `Période;${logs[0].log_date} → ${logs[logs.length-1].log_date}\n`;
    csv += `Entrées;${logs.length}\n`;
    csv += `Humeur moyenne;${avgMood}/5\n`;
    csv += `Énergie moyenne;${avgEnergy}/5\n`;
    csv += `Sommeil moyen;${avgSleep}/5\n`;
    csv += `Jours entraînés;${trainDays}/${logs.length} (${Math.round(trainDays/logs.length*100)}%)\n`;

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `sportvise_journal_${athleteName.replace(/\s/g,'_')}_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    console.error('Export CSV error:', e);
    alert('Erreur lors de l\'export.');
  }
}

// ── MONTHLY REPORT PDF ──────────────────────────────
async function generateMonthlyReport() {
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const athleteName = userProfile?.full_name || 'Athlète';
    const sport = userProfile?.sport || 'Sport';
    const today = new Date();
    const monthName = today.toLocaleDateString('fr-FR', {month:'long', year:'numeric'});

    // Fetch 30 days of data
    const thirtyDaysAgo = new Date(today.getTime() - 30*86400000);
    const { data: logs } = await sb.from('daily_log')
      .select('*').eq('user_id', currentUser.id)
      .gte('log_date', thirtyDaysAgo.toISOString().split('T')[0])
      .order('log_date', { ascending: true });

    const { data: goals } = await sb.from('goals')
      .select('*').eq('user_id', currentUser.id);

    const { data: events } = await sb.from('calendar_events')
      .select('*').eq('user_id', currentUser.id)
      .gte('event_date', thirtyDaysAgo.toISOString().split('T')[0])
      .lte('event_date', today.toISOString().split('T')[0]);

    if (!logs || logs.length === 0) { alert('Pas assez de données.'); return; }

    // HEADER
    doc.setFillColor(7, 9, 26);
    doc.rect(0, 0, 210, 45, 'F');
    doc.setTextColor(245, 158, 11);
    doc.setFontSize(22);
    doc.setFont('helvetica', 'bold');
    doc.text('SPORTVISE', 20, 20);
    doc.setFontSize(10);
    doc.setTextColor(200, 200, 200);
    doc.text('Rapport Mensuel de Progression', 20, 28);
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(12);
    doc.text(`${athleteName} · ${sport} · ${monthName}`, 20, 38);

    let y = 55;

    // STATS SUMMARY
    const avgMood = (logs.reduce((a,l)=>a+(l.mood||0),0)/logs.length).toFixed(1);
    const avgEnergy = (logs.reduce((a,l)=>a+(l.energy||0),0)/logs.length).toFixed(1);
    const avgSleep = (logs.reduce((a,l)=>a+(l.sleep_quality||0),0)/logs.length).toFixed(1);
    const avgNutrition = (logs.reduce((a,l)=>a+(l.nutrition_quality||0),0)/logs.length).toFixed(1);
    const trainDays = logs.filter(l=>l.training_done).length;
    const fScores = logs.map(l=>computeFitnessScore(l)).filter(Boolean);
    const avgFitness = fScores.length ? Math.round(fScores.reduce((a,b)=>a+b,0)/fScores.length) : 0;

    doc.setTextColor(50, 50, 50);
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.text('Vue d\'ensemble', 20, y);
    y += 10;

    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    const stats = [
      [`Période analysée: ${logs.length} jours`, `Fitness Score moyen: ${avgFitness}/100`],
      [`Humeur moyenne: ${avgMood}/5`, `Énergie moyenne: ${avgEnergy}/5`],
      [`Sommeil moyen: ${avgSleep}/5`, `Nutrition moyenne: ${avgNutrition}/5`],
      [`Jours entraînés: ${trainDays}/${logs.length} (${Math.round(trainDays/logs.length*100)}%)`, `Événements: ${(events||[]).length}`]
    ];
    stats.forEach(row => {
      doc.text(row[0], 20, y);
      doc.text(row[1], 110, y);
      y += 6;
    });
    y += 6;

    // TRENDS
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.text('Tendances', 20, y);
    y += 8;
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');

    const trend = (arr) => {
      if (arr.length < 4) return 'stable';
      const half = Math.floor(arr.length/2);
      const first = arr.slice(0,half).reduce((a,b)=>a+b,0)/half;
      const second = arr.slice(half).reduce((a,b)=>a+b,0)/(arr.length-half);
      return second-first > 0.3 ? 'en hausse ↗' : second-first < -0.3 ? 'en baisse ↘' : 'stable →';
    };

    const trends = [
      {label:'Humeur', val:trend(logs.map(l=>l.mood||0))},
      {label:'Énergie', val:trend(logs.map(l=>l.energy||0))},
      {label:'Sommeil', val:trend(logs.map(l=>l.sleep_quality||0))},
      {label:'Motivation', val:trend(logs.map(l=>l.motivation||0))},
      {label:'Fitness Score', val:trend(fScores)}
    ];
    trends.forEach(t => {
      doc.text(`• ${t.label}: ${t.val}`, 25, y);
      y += 6;
    });
    y += 6;

    // GOALS
    if (goals && goals.length > 0) {
      doc.setFontSize(14);
      doc.setFont('helvetica', 'bold');
      doc.text('Objectifs', 20, y);
      y += 8;
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      goals.slice(0, 6).forEach(g => {
        const progress = g.target_value ? Math.round((g.current_value/g.target_value)*100) : 0;
        doc.text(`• ${g.title}: ${progress}% (${g.status})`, 25, y);
        y += 6;
      });
      y += 6;
    }

    // RECOMMENDATIONS
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.text('Recommandations', 20, y);
    y += 8;
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    const recs = [];
    if (parseFloat(avgSleep) < 3) recs.push('Priorité sommeil : ta qualité de sommeil est faible. Consulte Nora (agent sommeil) pour un plan d\'amélioration.');
    if (parseFloat(avgMood) < 3) recs.push('Soutien mental : ton humeur a été basse ce mois. Emma (agent mental) peut t\'aider avec des techniques de gestion émotionnelle.');
    if (trainDays/logs.length < 0.3) recs.push('Régularité d\'entraînement : seulement '+Math.round(trainDays/logs.length*100)+'% des jours. Vise au moins 50% pour progresser.');
    if (parseFloat(avgNutrition) < 3) recs.push('Alimentation : qualité nutritionnelle à améliorer. Clara (agent nutrition) peut créer un plan adapté.');
    if (recs.length === 0) recs.push('Continue comme ça ! Tes indicateurs sont solides. Maintiens ta régularité.');
    recs.forEach(r => {
      const lines = doc.splitTextToSize('• ' + r, 170);
      lines.forEach(line => { doc.text(line, 25, y); y += 5; });
      y += 2;
    });

    // FOOTER
    doc.setFillColor(7, 9, 26);
    doc.rect(0, 280, 210, 17, 'F');
    doc.setTextColor(150, 150, 150);
    doc.setFontSize(8);
    doc.text('SPORTVISE · Management Sportif IA · sportvise.ch · Généré le ' + today.toLocaleDateString('fr-CH'), 20, 290);

    doc.save(`SPORTVISE_Rapport_${monthName.replace(/\s/g,'_')}_${athleteName.replace(/\s/g,'_')}.pdf`);
  } catch(e) {
    console.error('Monthly report error:', e);
    alert('Erreur lors de la génération du rapport.');
  }
}

// ── SHARE CARD DOWNLOAD ─────────────────────────────
async function downloadShareCard() {
  try {
    const score = await computeSportViseScore();
    const name = (userProfile?.full_name || 'Athlète').split(' ')[0];
    const sport = userProfile?.sport || 'Sport';
    const W = 1080, H = 1920;
    const c = document.createElement('canvas'); c.width = W; c.height = H;
    const ctx = c.getContext('2d');

    // Background gradient
    const bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0, '#07091a'); bg.addColorStop(0.5, '#0d1127'); bg.addColorStop(1, '#111827');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    // Decorative circles
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#f59e0b'; ctx.beginPath(); ctx.arc(180, 320, 200, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#06b6d4'; ctx.beginPath(); ctx.arc(900, 1400, 250, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;

    // Top badge
    ctx.fillStyle = '#f59e0b15'; roundRect(ctx, 340, 120, 400, 50, 25); ctx.fill();
    ctx.fillStyle = '#f59e0b'; ctx.font = '700 28px Inter, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('SPORTVISE', W/2, 155);

    // Name + sport
    ctx.fillStyle = '#f1f5f9'; ctx.font = '900 72px Inter, sans-serif';
    ctx.fillText(name, W/2, 320);
    ctx.fillStyle = '#94a3b8'; ctx.font = '600 36px Inter, sans-serif';
    ctx.fillText(sport + ' · Suisse 🇨🇭', W/2, 380);

    // Score circle
    const cx = W/2, cy = 620, r = 160;
    const scoreVal = score?.global || 0;
    const gc = scoreVal >= 80 ? '#f59e0b' : scoreVal >= 60 ? '#10b981' : scoreVal >= 40 ? '#f97316' : '#ef4444';

    // Circle bg
    ctx.strokeStyle = '#1e2d47'; ctx.lineWidth = 18; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
    // Circle progress
    ctx.strokeStyle = gc; ctx.lineWidth = 18; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + (Math.PI*2 * scoreVal/100)); ctx.stroke();
    // Score text
    ctx.fillStyle = gc; ctx.font = '900 96px Inter, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(scoreVal, cx, cy + 30);
    ctx.fillStyle = '#94a3b8'; ctx.font = '600 28px Inter, sans-serif';
    ctx.fillText('Score SPORTVISE', cx, cy + 70);

    // Sub-scores
    const subs = [
      {label:'Physique', val: score?.physical||0, color:'#ef4444', emoji:'💪'},
      {label:'Mental', val: score?.mental||0, color:'#06b6d4', emoji:'🧠'},
      {label:'Nutrition', val: score?.nutrition||0, color:'#84cc16', emoji:'🥗'},
      {label:'Sommeil', val: score?.sleep||0, color:'#a78bfa', emoji:'😴'},
      {label:'Récup', val: score?.recovery||0, color:'#14b8a6', emoji:'♻️'}
    ];
    const barY = 880, barH = 80;
    subs.forEach((s, i) => {
      const y = barY + i * barH;
      // Label
      ctx.textAlign = 'left'; ctx.fillStyle = '#94a3b8'; ctx.font = '600 30px Inter, sans-serif';
      ctx.fillText(s.emoji + ' ' + s.label, 120, y + 30);
      // Bar bg
      ctx.fillStyle = '#1e2d47'; roundRect(ctx, 420, y + 8, 480, 28, 14); ctx.fill();
      // Bar value
      ctx.fillStyle = s.color; roundRect(ctx, 420, y + 8, Math.max(480 * s.val/100, 28), 28, 14); ctx.fill();
      // Value
      ctx.textAlign = 'right'; ctx.fillStyle = '#f1f5f9'; ctx.font = '800 30px Inter, sans-serif';
      ctx.fillText(s.val, 960, y + 32);
    });

    // Streak info
    const { data: logs } = await sb.from('daily_log').select('log_date').eq('user_id', currentUser.id).order('log_date', {ascending:false}).limit(60);
    let streak = 0;
    if (logs && logs.length > 0) {
      const todayStr = new Date().toISOString().split('T')[0];
      const yesterdayStr = new Date(Date.now()-86400000).toISOString().split('T')[0];
      const dates = logs.map(l=>l.log_date);
      let check = dates.includes(todayStr)?new Date():dates.includes(yesterdayStr)?new Date(Date.now()-86400000):null;
      if(check){while(dates.includes(check.toISOString().split('T')[0])){streak++;check=new Date(check.getTime()-86400000);}}
    }

    // Streak badge
    const streakY = 1340;
    ctx.fillStyle = '#f59e0b12'; roundRect(ctx, 240, streakY, 600, 100, 20); ctx.fill();
    ctx.strokeStyle = '#f59e0b30'; ctx.lineWidth = 2; roundRect(ctx, 240, streakY, 600, 100, 20); ctx.stroke();
    ctx.fillStyle = '#f59e0b'; ctx.font = '900 48px Inter, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('🔥 ' + streak + ' jour' + (streak!==1?'s':'') + ' de streak', W/2, streakY + 65);

    // CTA
    ctx.fillStyle = '#f59e0b'; roundRect(ctx, 240, 1540, 600, 90, 20); ctx.fill();
    ctx.fillStyle = '#07091a'; ctx.font = '800 36px Inter, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Rejoins-moi sur sportvise.ch', W/2, 1598);

    // Footer
    ctx.fillStyle = '#64748b'; ctx.font = '500 24px Inter, sans-serif';
    ctx.fillText('11 agents IA · 100% Swiss Made 🇨🇭', W/2, 1720);
    ctx.fillStyle = '#f59e0b50'; ctx.font = '700 22px Inter, sans-serif';
    ctx.fillText('#SPORTVISE  #' + sport.replace(/\s/g,'') + '  #SwissSport', W/2, 1770);

    // Download as PNG
    c.toBlob(function(blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'sportvise_' + name.toLowerCase() + '_' + new Date().toISOString().split('T')[0] + '.png';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Image téléchargée ! Partage-la en Story 📸');
    }, 'image/png');
  } catch(e) {
    console.error('Share card error:', e);
    showToast('Erreur — fais une capture d\'écran à la place !');
  }
}

// Canvas helper: rounded rectangle
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}
