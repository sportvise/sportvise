// ── RÉCAP HEBDO (affiché le lundi sur le dashboard) ──
async function getWeeklyRecap() {
  var today = new Date();
  var dayOfWeek = today.getDay(); // 0=dimanche, 1=lundi
  // Show recap on Monday (1) and Tuesday (2) only
  if (dayOfWeek !== 1 && dayOfWeek !== 2) return null;

  var weekAgo = new Date(today.getTime() - 7 * 86400000);
  var weekAgoStr = weekAgo.toISOString().split('T')[0];
  var todayStr = today.toISOString().split('T')[0];

  // Get last week's logs
  var result = await sb.from('daily_log')
    .select('*').eq('user_id', currentUser.id)
    .gte('log_date', weekAgoStr)
    .lt('log_date', todayStr)
    .order('log_date', { ascending: true });
  var logs = result.data || [];

  if (logs.length < 2) return null;

  // Get messages count
  var msgResult = await sb.from('messages')
    .select('agent_id', { count: 'exact' })
    .eq('user_id', currentUser.id).eq('role', 'user')
    .gte('created_at', weekAgo.toISOString());
  var weekMsgs = msgResult.count || 0;

  // Compute averages
  var avgMood = 0, avgEnergy = 0, avgSleep = 0, trainings = 0;
  logs.forEach(function(l) {
    avgMood += (l.mood || 0);
    avgEnergy += (l.energy || 0);
    avgSleep += (l.sleep_quality || 0);
    if (l.training_done) trainings++;
  });
  avgMood = (avgMood / logs.length).toFixed(1);
  avgEnergy = (avgEnergy / logs.length).toFixed(1);
  avgSleep = (avgSleep / logs.length).toFixed(1);

  // Compute fitness scores
  var scores = logs.map(function(l) { return computeFitnessScore(l); }).filter(function(s) { return s !== null; });
  var avgScore = scores.length > 0 ? Math.round(scores.reduce(function(a,b){return a+b},0) / scores.length) : null;

  // Trend vs previous week
  var twoWeeksAgo = new Date(today.getTime() - 14 * 86400000);
  var prevResult = await sb.from('daily_log')
    .select('mood, energy, sleep_quality').eq('user_id', currentUser.id)
    .gte('log_date', twoWeeksAgo.toISOString().split('T')[0])
    .lt('log_date', weekAgoStr);
  var prevLogs = prevResult.data || [];

  var prevMood = prevLogs.length > 0 ? prevLogs.reduce(function(a,l){return a+(l.mood||0)},0)/prevLogs.length : null;
  var moodTrend = prevMood !== null ? (avgMood - prevMood).toFixed(1) : null;

  return {
    nbJours: logs.length,
    avgMood: avgMood,
    avgEnergy: avgEnergy,
    avgSleep: avgSleep,
    trainings: trainings,
    weekMsgs: weekMsgs,
    avgScore: avgScore,
    moodTrend: moodTrend
  };
}

function generateLocalReport(logs, score, name) {
  if (!logs || logs.length < 2) return 'Pas assez de données pour générer un rapport. Remplis ton journal tous les jours !';
  const nbJours = logs.length;
  const avgMood = (logs.reduce((a,l)=>a+(l.mood||0),0)/nbJours).toFixed(1);
  const avgEnergy = (logs.reduce((a,l)=>a+(l.energy||0),0)/nbJours).toFixed(1);
  const trainings = logs.filter(l=>l.training_done).length;

  let report = `**Résumé de la semaine**\n${name}, tu as rempli ton journal ${nbJours} jour${nbJours>1?'s':''} sur 7 cette semaine. `;
  report += avgMood >= 7 ? 'Ton moral était au beau fixe ! ' : avgMood >= 5 ? 'Ton moral était stable. ' : 'Ton moral était un peu bas cette semaine. ';
  report += `\n\n**Points forts**\n`;
  if (nbJours >= 5) report += '- Régularité exemplaire dans le suivi\n';
  if (trainings >= 3) report += '- ' + trainings + ' entraînements cette semaine, bravo !\n';
  if (parseFloat(avgMood) >= 7) report += '- Excellent moral tout au long de la semaine\n';
  if (score?.global >= 70) report += '- Score SPORTVISE solide à ' + score.global + '/100\n';

  report += `\n**Axes d'amélioration**\n`;
  if (nbJours < 5) report += '- Vise 7/7 jours de journal pour un suivi optimal\n';
  if (parseFloat(avgEnergy) < 6) report += '- Ton énergie mérite attention — vérifie sommeil et nutrition\n';
  if (score?.sleep < 50) report += '- Le sommeil est ton point faible, parle à Nora\n';
  if (score?.recovery < 50) report += '- La récupération est à améliorer, consulte Julie\n';

  report += `\n**Recommandations pour la semaine prochaine**\n`;
  report += '1. Remplis ton journal chaque soir avant de dormir (30 secondes)\n';
  if (score?.sleep < 60) report += '2. Fixe une heure de coucher et respecte-la pendant 5 jours\n';
  else report += '2. Ajoute un objectif hebdomadaire dans ton calendrier\n';
  report += '3. Consulte au moins 3 agents différents pour un accompagnement complet\n';

  report += `\n**Message de Lucas**\n`;
  report += score?.global >= 70 ? `${name}, tu es sur la bonne voie. Continue comme ça et tu verras des résultats concrets. La régularité, c'est ton meilleur allié !` :
    `${name}, chaque semaine est une opportunité de progresser. L'important n'est pas d'être parfait, mais d'être constant. On avance ensemble !`;

  return report;
}

function connectStrava() {
  const STRAVA_CLIENT_ID = '140498';
  const redirectUri = encodeURIComponent(window.location.origin + '/.netlify/functions/strava-auth');
  const scope = 'read,activity:read_all,profile:read_all';
  const url = `https://www.strava.com/oauth/authorize?client_id=${STRAVA_CLIENT_ID}&response_type=code&redirect_uri=${redirectUri}&scope=${scope}&approval_prompt=auto`;

  const popup = window.open(url, 'strava_auth', 'width=600,height=700');

  const handler = (evt) => {
    if (evt.data && evt.data.type === 'strava_auth') {
      window.removeEventListener('message', handler);
      const data = evt.data.data;
      localStorage.setItem(`sv_strava_${currentUser.id}`, JSON.stringify({
        access_token: data.access_token,
        refresh_token: data.refresh_token,
        expires_at: data.expires_at,
        athlete: data.athlete,
        connected_at: new Date().toISOString()
      }));
      showPage('connexions');
      showToast('✅ Strava connecté avec succès !');
      syncStrava();
    }
  };
  window.addEventListener('message', handler);
}

function disconnectStrava() {
  if (!confirm('Déconnecter Strava ? Tes données synchronisées seront supprimées localement.')) return;
  localStorage.removeItem(`sv_strava_${currentUser.id}`);
  localStorage.removeItem(`sv_strava_act_${currentUser.id}`);
  localStorage.removeItem('sv_strava_sync');
  showPage('connexions');
  showToast('Strava déconnecté');
}

async function syncStrava() {
  const conn = getStravaConnection();
  if (!conn) return;

  const now = Math.floor(Date.now() / 1000);
  let accessToken = conn.access_token;

  if (conn.expires_at && conn.expires_at < now + 300) {
    try {
      const res = await fetch('/.netlify/functions/strava-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: conn.refresh_token })
      });
      if (res.ok) {
        const refreshed = await res.json();
        conn.access_token = refreshed.access_token;
        conn.refresh_token = refreshed.refresh_token;
        conn.expires_at = refreshed.expires_at;
        localStorage.setItem(`sv_strava_${currentUser.id}`, JSON.stringify(conn));
        accessToken = refreshed.access_token;
      } else {
        showToast('⚠️ Erreur de rafraîchissement Strava. Reconnecte-toi.');
        return;
      }
    } catch (e) {
      console.error('Strava refresh error:', e);
      return;
    }
  }

  try {
    const syncBtn = document.getElementById('stravaSyncBtn');
    if (syncBtn) { syncBtn.disabled = true; syncBtn.textContent = '⏳ Synchronisation...'; }

    const res = await fetch('/.netlify/functions/strava-sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ access_token: accessToken, per_page: 30 })
    });

    if (res.ok) {
      const data = await res.json();
      localStorage.setItem(`sv_strava_act_${currentUser.id}`, JSON.stringify(data.activities || []));
      localStorage.setItem(`sv_strava_sync_${currentUser.id}`, JSON.stringify({
        last_sync: data.synced_at,
        count: data.count,
        weekStats: data.weekStats
      }));
      showToast('✅ ' + data.count + ' activités synchronisées !');
      displayStravaActivities(data.activities, data.weekStats);
    } else if (res.status === 401) {
      showToast('⚠️ Token Strava expiré. Reconnecte-toi.');
      localStorage.removeItem(`sv_strava_${currentUser.id}`);
      showPage('connexions');
    } else {
      showToast('⚠️ Erreur de synchronisation Strava');
    }

    if (syncBtn) { syncBtn.disabled = false; syncBtn.textContent = '🔄 Synchroniser'; }
  } catch (e) {
    console.error('Strava sync error:', e);
    showToast('⚠️ Erreur réseau Strava');
  }
}

function getStravaContext() {
  const activities = JSON.parse(localStorage.getItem(`sv_strava_act_${currentUser.id}`) || '[]');
  const syncInfo = JSON.parse(localStorage.getItem(`sv_strava_sync_${currentUser.id}`) || '{}');
  if (!activities.length) return '';

  const recent = activities.slice(0, 10);
  let ctx = '\n[DONNÉES STRAVA — Dernière sync: ' + (syncInfo.last_sync || 'inconnue') + ']\n';

  if (syncInfo.weekStats) {
    const ws = syncInfo.weekStats;
    ctx += 'Résumé période: ' + ws.total_activities + ' activités, ' + ws.total_duration_min + 'min total, ' + ws.total_distance_km + 'km, ';
    ctx += 'Intensité: ' + ws.intensity_breakdown.high + ' intenses / ' + ws.intensity_breakdown.medium + ' moyennes / ' + ws.intensity_breakdown.light + ' légères\n';
    if (ws.avg_heartrate) ctx += 'FC moyenne: ' + ws.avg_heartrate + ' bpm\n';
  }

  ctx += 'Dernières activités:\n';
  recent.forEach(function(a) {
    ctx += '- ' + a.date + ': ' + a.summary + ' [' + a.intensity + ']\n';
  });

  return ctx;
}

// ── LIVE SPORTS DATA (API-Sports) ─────────────────────
// Fetches live standings and recent results for the athlete's sport league
// Cached in localStorage for 6 hours to save API calls (100/day limit)
async function getSportsDataContext() {
  try {
    const sport = userProfile?.sport?.toLowerCase() || '';
    // Only fetch for supported sports
    const sportMap = {
      'football': { sport: 'football', league: 207 },
      'hockey': { sport: 'hockey', league: 38 },
      'hockey sur glace': { sport: 'hockey', league: 38 }
    };

    let sportConfig = null;
    for (const [key, config] of Object.entries(sportMap)) {
      if (sport.includes(key)) { sportConfig = config; break; }
    }
    if (!sportConfig) return ''; // Sport not supported by API-Sports

    // Check cache (6 hours)
    const cacheKey = 'sv_sports_data_' + sportConfig.sport;
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      try {
        const parsed = JSON.parse(cached);
        if (Date.now() - parsed.timestamp < 6 * 3600 * 1000) return parsed.context;
      } catch(e) {}
    }

    // Fetch standings + recent results in parallel
    const [standingsRes, resultsRes] = await Promise.all([
      fetch('/.netlify/functions/sports-data?sport=' + sportConfig.sport + '&action=standings&league=' + sportConfig.league).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch('/.netlify/functions/sports-data?sport=' + sportConfig.sport + '&action=results&league=' + sportConfig.league).then(r => r.ok ? r.json() : null).catch(() => null)
    ]);

    let ctx = '\n[DONNÉES SPORTIVES LIVE — ' + new Date().toLocaleDateString('fr-CH') + ']\n';

    // Add standings
    if (standingsRes?.data?.standings) {
      ctx += 'CLASSEMENT ' + (standingsRes.data.league || 'Super League') + ' ' + (standingsRes.data.season || '2025') + ':\n';
      standingsRes.data.standings.slice(0, 12).forEach(function(t) {
        ctx += t.rank + '. ' + t.team + ' — ' + t.points + 'pts (' + t.win + 'V ' + t.draw + 'N ' + t.lose + 'D, diff: ' + (t.goalDiff > 0 ? '+' : '') + t.goalDiff + ') forme: ' + (t.form || '?') + '\n';
      });
    }

    // Add recent results
    if (resultsRes?.data?.fixtures) {
      ctx += '\nDERNIERS RÉSULTATS:\n';
      resultsRes.data.fixtures.slice(0, 5).forEach(function(f) {
        var date = new Date(f.date).toLocaleDateString('fr-CH', {day:'numeric', month:'short'});
        ctx += date + ': ' + f.home + ' ' + (f.scoreHome ?? '?') + '-' + (f.scoreAway ?? '?') + ' ' + f.away + '\n';
      });
    }

    ctx += '\nUtilise ces données pour personnaliser tes conseils. Si l\'athlète a un match contre une équipe, utilise le classement pour évaluer l\'adversaire.\n';

    // Cache for 6 hours
    localStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), context: ctx }));

    return ctx;
  } catch(e) {
    console.warn('Sports data error:', e);
    return '';
  }
}

// ── KEYBOARD SHORTCUTS ──────────────────────────────
document.addEventListener('keydown', (e) => {
  const isInput = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);

  // Escape: close any modal or go back to dashboard
  if (e.key === 'Escape') {
    const modal = document.querySelector('.modal-overlay');
    if (modal) { modal.remove(); return; }
    if (currentPage !== 'dashboard') {
      showPage('dashboard', document.querySelector('.nav-item'));
    }
    return;
  }

  // Don't trigger shortcuts when typing in an input
  if (isInput) return;

  // Ctrl/Cmd + K: focus chat input
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    const chatInput = document.getElementById('chatInput');
    if (chatInput) chatInput.focus();
    return;
  }

  // Ctrl/Cmd + Shift + D: toggle dark/light mode
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'D') {
    e.preventDefault();
    toggleTheme();
    return;
  }

  // Number shortcuts for quick agent access (1-9, 0)
  const agentKeys = ['equipe','marketing','sponsors','contrats','finance','comptabilite','physique','mental','nutrition','sommeil','recuperation'];
  if (e.key >= '1' && e.key <= '9' && !e.ctrlKey && !e.metaKey && !e.altKey) {
    const idx = parseInt(e.key) - 1;
    if (agentKeys[idx]) {
      showPage(agentKeys[idx], document.querySelector(`[onclick*="${agentKeys[idx]}"]`) || null);
    }
    return;
  }
  if (e.key === '0' && !e.ctrlKey && !e.metaKey && !e.altKey) {
    showPage(agentKeys[9], document.querySelector(`[onclick*="${agentKeys[9]}"]`) || null);
    return;
  }

  // D: Dashboard
  if (e.key === 'd' || e.key === 'D') {
    showPage('dashboard', document.querySelector('.nav-item') || null);
    return;
  }

  // J: Journal
  if (e.key === 'j' || e.key === 'J') {
    showPage('journal', document.querySelector('[onclick*="journal"]') || null);
    return;
  }

  // P: Progression
  if (e.key === 'p' || e.key === 'P') {
    showPage('progression', document.querySelector('[onclick*="progression"]') || null);
    return;
  }

  // C: Calendar
  if (e.key === 'c' || e.key === 'C') {
    showPage('calendrier', document.querySelector('[onclick*="calendrier"]') || null);
    return;
  }

  // ?: Show shortcuts help
  if (e.key === '?') {
    showShortcutsHelp();
    return;
  }
});

function showShortcutsHelp() {
  const existing = document.querySelector('.modal-overlay');
  if (existing) { existing.remove(); return; }

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal-box" style="max-width:480px">
      <h2 style="font-size:18px;font-weight:800;margin-bottom:4px">⌨️ Raccourcis clavier</h2>
      <p style="font-size:12px;color:var(--muted);margin-bottom:20px">Navigue plus vite dans SPORTVISE</p>
      <div style="display:grid;gap:8px">
        ${[
          ['Escape','Fermer / Retour dashboard'],
          ['Ctrl + K','Focus sur le chat'],
          ['Ctrl + Shift + D','Mode clair/sombre'],
          ['1-9, 0','Accès direct aux 11 agents'],
          ['D','Dashboard'],
          ['J','Journal'],
          ['P','Progression'],
          ['C','Calendrier'],
          ['?','Afficher cette aide']
        ].map(([key,desc]) => `
          <div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--border)10">
            <kbd style="padding:4px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--border);font-size:11px;font-weight:700;color:var(--gold);font-family:'Inter',sans-serif;min-width:120px;text-align:center">${key}</kbd>
            <span style="font-size:12px;color:var(--muted2)">${desc}</span>
          </div>
        `).join('')}
      </div>
      <button onclick="this.closest('.modal-overlay').remove()" style="width:100%;margin-top:20px;padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-weight:600;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif">Fermer</button>
    </div>
  `;
  document.body.appendChild(overlay);
}
</script>
<div id="versionBadge" style="position:fixed;bottom:70px;right:10px;background:rgba(0,0,0,0.7);color:#f59e0b;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;z-index:99999;font-family:'Inter',sans-serif;pointer-events:none;border:1px solid #f59e0b30;">v26</div>
</body>
