<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPORTVISE — Nettoyage</title>
  <style>
    body { background:#07091a; color:#f1f5f9; font-family:'Inter',system-ui,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:20px; text-align:center; }
    .box { max-width:360px; }
    h1 { font-size:18px; margin:16px 0 8px; }
    p { font-size:13px; color:#64748b; line-height:1.6; }
    .spinner { width:48px; height:48px; border:3px solid #1e2d47; border-top-color:#f59e0b; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto; }
    @keyframes spin { to { transform:rotate(360deg) } }
    .done { color:#10b981; font-size:32px; display:none; }
    .status { margin-top:16px; font-size:12px; color:#64748b; min-height:20px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner" id="spinner"></div>
    <div class="done" id="done">&#10003;</div>
    <h1>Nettoyage en cours...</h1>
    <p>Suppression du cache et des anciens Service Workers pour corriger les bugs d'affichage.</p>
    <div class="status" id="status"></div>
  </div>
  <script>
  (async function() {
    const status = document.getElementById('status');
    try {
      // 1. Unregister ALL service workers
      if ('serviceWorker' in navigator) {
        status.textContent = 'Suppression des Service Workers...';
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
        status.textContent = regs.length + ' Service Worker(s) supprimé(s)';
      }

      // 2. Delete ALL caches
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
        status.textContent = keys.length + ' cache(s) supprimé(s)';
      }

      // 3. Clear ALL localStorage and sessionStorage (kills Supabase sessions + all app data)
      status.textContent = 'Nettoyage des sessions...';
      localStorage.clear();
      sessionStorage.clear();

      // Done
      await new Promise(r => setTimeout(r, 500));
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('done').style.display = 'block';
      document.querySelector('h1').textContent = 'Nettoyage terminé !';
      document.querySelector('p').textContent = 'Redirection vers SPORTVISE dans 2 secondes...';
      status.textContent = '';

      setTimeout(() => {
        window.location.href = '/login.html';
      }, 2000);
    } catch(e) {
      status.textContent = 'Erreur: ' + e.message;
      setTimeout(() => { window.location.href = '/login.html'; }, 3000);
    }
  })();
  </script>
</body>
</html>
